<script>

// ═══════════════════════════════════════════════════════════════
// ANGLOVIE 2.0 — 🚨 FRANCOPHONE TRAPS
// Each classic mistake, its logic, its fix — English first,
// French only to explain WHY the mistake happens.
// ═══════════════════════════════════════════════════════════════
REV_CATS.splice(4,0,{id:"pieges",icon:"🚨",titre:"Francophone Traps"});

[
{id:"p_explainme",cat:"pieges",niveau:"A2",titre:"\"Explain me\" ❌ → Explain TO me",
 pts:["The trap: in French you say « explique-moi ». In English, EXPLAIN requires TO: Explain it TO me. Can you explain this rule TO me?",
 "The logic: some English verbs refuse a direct person. EXPLAIN, DESCRIBE, SUGGEST, RECOMMEND → always TO: She described the problem TO us.",
 "But TELL works like French: Tell me! ✔ — which is exactly why francophones mix them up: tell me ✔, explain me ❌."],
 exemple:"Could you explain the difference to me? — Sure! Let me tell you how it works.",
 exos:[
 {q:"« Explique-moi cette règle » →",options:["Explain this rule to me.","Explain me this rule.","Explain to this rule me.","Me explain this rule."],bonne:0,exp:"EXPLAIN + thing + TO + person."},
 {q:"Which verb accepts \"me\" directly?",options:["tell → tell me","explain → explain me","describe → describe me","suggest → suggest me"],bonne:0,exp:"TELL me ✔. The other three require TO me."}]},
{id:"p_search",cat:"pieges",niveau:"A2",titre:"\"I search a job\" ❌ → I'm looking FOR a job",
 pts:["The trap: « je cherche un emploi » ≠ I search a job. Say: I'm looking FOR a job.",
 "The logic: LOOK FOR = everyday searching. SEARCH is different: search the Internet (dig through), search FOR (deep, formal search).",
 "Casual Canadian bonus: job hunting! I've been job hunting for two months."],
 exemple:"I'm looking for a full-time job in customer service. I searched the company's website first.",
 exos:[
 {q:"« Je cherche un appartement » →",options:["I'm looking for an apartment.","I search an apartment.","I'm searching apartment.","I look an apartment."],bonne:0,exp:"LOOK FOR — don't forget the FOR!"},
 {q:"« Elle cherche ses clés » →",options:["She's looking for her keys.","She searches her keys.","She looks her keys.","She is search for keys."],bonne:0,exp:"Always LOOK FOR + the thing."}]},
{id:"p_liveleave",cat:"pieges",niveau:"A2",titre:"LIVE or LEAVE? Where do you live?",
 pts:["The sound trap: LIVE (to reside, short \"i\") and LEAVE (to go away, long \"ee\"). Where do you LIVE? = where is your home. Don't say Where do you LEAVE? (where do you depart from?!)",
 "LIVE: I live in Toronto. She lives with her sister. LEAVE: I leave home at 8. The bus leaves in 5 minutes.",
 "Memory trick: leave has two E's, like leaving takes time; live is short, like daily life."],
 exemple:"I live near the station, so I leave home ten minutes before my shift.",
 exos:[
 {q:"« Où habitez-vous ? » →",options:["Where do you live?","Where do you leave?","Where you live?","Where does you live?"],bonne:0,exp:"LIVE = reside. \"Where do you leave?\" asks where you depart from!"},
 {q:"« Le train part à 9 h » →",options:["The train leaves at 9.","The train lives at 9.","The train leave at 9.","The train is live at 9."],bonne:0,exp:"LEAVE = depart; third person → leaveS."}]},
{id:"p_mustHaveTo",cat:"pieges",niveau:"B1",titre:"MUST vs HAVE TO",
 pts:["Both mean « devoir », but: HAVE TO = external obligation (rule, law, boss): I have to work Saturdays. MUST = obligation I feel, or strong recommendation: You must try this restaurant!",
 "In the negative, the meaning flips completely! DON'T HAVE TO = not obliged (free): You don't have to come. MUSTN'T = forbidden! You mustn't park here.",
 "In everyday Canadian English, HAVE TO dominates. And must has no past → HAD TO: I had to wait two hours."],
 exemple:"I have to renew my permit this month. You must see the new office — it's beautiful! You don't have to bring anything.",
 exos:[
 {q:"« Tu n'es pas obligé de venir » →",options:["You don't have to come.","You mustn't come.","You must not to come.","You haven't to come."],bonne:0,exp:"DON'T HAVE TO = no obligation. MUSTN'T = forbidden — a dangerous mix-up!"},
 {q:"« J'ai dû attendre une heure » (past) →",options:["I had to wait an hour.","I must waited an hour.","I musted wait an hour.","I have to waited an hour."],bonne:0,exp:"MUST has no past → HAD TO."}]},
{id:"p_sinceFor",cat:"pieges",niveau:"B1",titre:"SINCE vs FOR",
 pts:["The trap: « depuis » has TWO translations. SINCE + starting point: since 2023, since Monday, since I arrived. FOR + duration: for two years, for three months.",
 "Quick test: if you could say « pendant » → FOR. If it's a precise date/moment → SINCE.",
 "With the present perfect: I've lived here SINCE 2023 = I've lived here FOR three years. Same reality, two angles."],
 exemple:"I've been in Canada since January — so I've been here for six months already!",
 exos:[
 {q:"« J'étudie l'anglais depuis trois mois » →",options:["I've been studying English for three months.","…since three months.","…for 2023.","…since three months ago."],bonne:0,exp:"Three months = a DURATION → FOR."},
 {q:"« Elle travaille ici depuis lundi » →",options:["She has worked here since Monday.","She has worked here for Monday.","She works here since Monday.","She worked here for Monday."],bonne:0,exp:"Monday = starting point → SINCE + present perfect."}]},
{id:"p_yetAlready",cat:"pieges",niveau:"B1",titre:"YET vs ALREADY",
 pts:["ALREADY = « déjà » in positive sentences (often with surprise): I've already finished! She's already here.",
 "YET = « pas encore / déjà ? » in questions and negatives, at the END of the sentence: I haven't received it yet. Have you eaten yet?",
 "The trap: « déjà ? » in a neutral question = YET, not already: Have you finished YET? (Already in a question = astonishment: Have you finished already?! — that fast?!)"],
 exemple:"Have you submitted your application yet? — Yes, I've already sent it! But I haven't heard back yet.",
 exos:[
 {q:"« Je n'ai pas encore reçu ma carte » →",options:["I haven't received my card yet.","I haven't already received my card.","I haven't received yet my card.","I not received my card already."],bonne:0,exp:"Negative → YET, always at the end."},
 {q:"« As-tu déjà mangé ? » (neutral) →",options:["Have you eaten yet?","Have you eaten already?","Did you eat yet already?","You have eaten yet?"],bonne:0,exp:"Neutral question → YET. (\"Already\" = that fast?!)"}]},
{id:"p_sayTell",cat:"pieges",niveau:"B1",titre:"SAY vs TELL",
 pts:["Both mean « dire », but: TELL + person: Tell ME, she told US, I'll tell the manager. SAY without a person (or with TO): He said (that)…, What did she say?, Say it TO him.",
 "The classic mistakes: He said me ❌ → He told me ✔. She told that… ❌ → She said that… ✔ (or She told ME that…).",
 "Fixed expressions: tell the truth, tell a story, tell the time — but say sorry, say hello, say a word."],
 exemple:"She told me the meeting was cancelled. — Really? What exactly did she say?",
 exos:[
 {q:"« Il m'a dit que c'était fermé » →",options:["He told me it was closed.","He said me it was closed.","He told that it was closed.","He said to that it was closed."],bonne:0,exp:"TELL + person: he told ME. (\"He said me\": THE calque to eliminate.)"},
 {q:"« Dis bonjour à ta mère ! » →",options:["Say hello to your mom!","Tell hello to your mom!","Say your mom hello to!","Tell hello your mom!"],bonne:0,exp:"SAY hello (fixed expression) + TO + person."}]},
{id:"p_makeDo",cat:"pieges",niveau:"B1",titre:"MAKE vs DO",
 pts:["The trap: « faire » has two verbs! DO = activities, work, vague tasks: do the dishes, do my homework, do business, do your best.",
 "MAKE = create, produce a result: make dinner, make money, make a decision, make a mistake, make an appointment, make friends.",
 "Canadian must-knows: make an appointment, make a living, do the groceries… but make a grocery list! When in doubt: concrete result → make."],
 exemple:"I made an appointment for Friday. I still have to do the paperwork — I hope I don't make a mistake!",
 exos:[
 {q:"« Prendre un rendez-vous » →",options:["make an appointment","do an appointment","take an appointment","have appointment"],bonne:0,exp:"MAKE an appointment — you \"create\" it."},
 {q:"« Faire une erreur » →",options:["make a mistake","do a mistake","make an error do","do mistake"],bonne:0,exp:"MAKE a mistake — a (regrettable but) concrete result!"}]},
{id:"p_attendAssist",cat:"pieges",niveau:"B2",titre:"ATTEND, ASSIST, ACTUALLY: the false-friend trio",
 pts:["ATTEND = be present at (« assister à »): I attended the meeting. ≠ « attendre » (= WAIT FOR: I'm waiting for the bus).",
 "ASSIST = help (formal): Can I assist you? ≠ « assister à ». « J'assiste à la réunion » → I'm attending the meeting (not assisting!).",
 "ACTUALLY = in fact (correction, precision): Actually, I'm from Cameroon. ≠ « actuellement » (= CURRENTLY: I'm currently unemployed). In an interview, mixing these two changes your whole message!"],
 exemple:"I'm currently taking English classes. Actually, I attended a workshop yesterday — the trainer assisted us a lot.",
 exos:[
 {q:"« J'ai assisté à trois réunions cette semaine » →",options:["I attended three meetings this week.","I assisted three meetings this week.","I waited three meetings this week.","I attended to three meetings."],bonne:0,exp:"Being present → ATTEND (no preposition)."},
 {q:"« Actuellement, je cherche un emploi » →",options:["Currently, I'm looking for a job.","Actually, I'm looking for a job.","Actually, I search a job.","In actual, I look for a job."],bonne:0,exp:"« Actuellement » = CURRENTLY. (Actually = in fact — says something else!)"}]}
].forEach(function(l){ REV_LECONS.push(l); });

</script>
<script>
/* ═══════════════════════════════════════════════════════════════

/* ── ⭐ MY ENGLISH BANK — core ───────────────────────────────── */
S.bank=S.bank||{};S.canCat=S.canCat||"all";S.vocabLvl=S.vocabLvl||"all";S.pattId=null;

function renderMyBank(){

async function coachPush(msg){
  S.coachChat.push({role:"user",content:msg});S.coachBusy=true;render();scrollCoach();
  try{
    var data=await nellyAPI({model:"claude-sonnet-4-6",max_tokens:800,system:COACH_SYSTEM+" Learner level: "+S.niveau+" aiming for "+S.cible+".",messages:S.coachChat.slice(-16)});

function coachReviewBank(){
  var items=Object.keys(S.bank).map(function(k){return S.bank[k];});
  if(!items.length){alert("Your English Bank is empty — tap ☆ on any word, expression or pattern to save it first!");return;}
  goTab("coach");
  var list=items.slice(-25).map(function(b){return b.text;}).join("; ");
  coachPush("Today let's review my English Bank — the "+Math.min(items.length,25)+" items I saved: "+list+". Quiz me on them one at a time (meaning or usage), correct my answers, and give me one natural example sentence for each.");
}

/* ── 🧩 ENGLISH PATTERNS — the structures natives use daily ── */
var PATTERNS=[
{p:"I would like to…",m:"Polite way to say what you want.",s:"I would like to + verb / I'd like + noun",ex:["I would like to open an account.","I'd like to book an appointment.","I'd like a coffee, please."],trap:"« Je voudrais » ≠ \"I want\" (too direct). Default to I'd like.",q:{q:"The polite version of \"I want an appointment\":",o:["I would like an appointment.","I am wanting an appointment.","Give me an appointment.","I like an appointment."],b:0,x:"I'd like = polite want."}},
{p:"I'm looking for…",m:"Say what you're searching for.",s:"I'm looking for + noun",ex:["I'm looking for a two-bedroom apartment.","I'm looking for a full-time job.","We're looking for a family doctor."],trap:"Never \"I search a job\" — LOOK FOR is the everyday verb.",q:{q:"« Je cherche un emploi » =",o:["I'm looking for a job.","I search a job.","I look a job.","I'm searching job."],b:0,x:"LOOK FOR — never forget the FOR."}},
{p:"Would you mind…?",m:"Extra-polite request.",s:"Would you mind + verb-ING…?",ex:["Would you mind repeating that?","Would you mind closing the window?","Would you mind waiting a moment?"],trap:"Verb takes -ING! And to say yes, answer \"Not at all!\" (= no problem).",q:{q:"\"Would you mind ___ that email again?\"",o:["sending","to send","send","sent"],b:0,x:"Would you mind + -ING: sending."}},
{p:"Could you…?",m:"The standard polite request.",s:"Could you + verb (+ please)?",ex:["Could you send me the form, please?","Could you speak more slowly?","Could you spell that for me?"],trap:"Could is softer than can. Add please — Canadian politeness loves it.",q:{q:"The most natural request:",o:["Could you help me, please?","You help me now.","Can helping me?","Help."],b:0,x:"Could you + please = the winning combo."}},
{p:"Do you mind if…?",m:"Asking permission.",s:"Do you mind if I + verb…?",ex:["Do you mind if I open the window?","Do you mind if I sit here?","Do you mind if I leave early today?"],trap:"\"No, go ahead!\" means YES you can (mind = être dérangé).",q:{q:"\"Do you mind if I sit here?\" — \"Not at all!\" means:",o:["Yes, please sit!","No, you can't.","Stand up.","I don't understand."],b:0,x:"Not at all = it doesn't bother me = go ahead."}},
{p:"I'm wondering if… / I was wondering…",m:"Soft, indirect way to ask.",s:"I was wondering if + subject + verb",ex:["I was wondering if the position is still open.","I'm wondering if you could help me.","I was wondering if we could reschedule."],trap:"The past (\"was wondering\") is MORE polite, not about the past!",q:{q:"The softest way to ask for help:",o:["I was wondering if you could help me.","Help me if you can.","I wonder you help me.","You could help."],b:0,x:"I was wondering if… = velvet-glove English."}},
{p:"I'd rather…",m:"Express a preference.",s:"I'd rather + base verb (than…)",ex:["I'd rather pay by debit.","I'd rather meet in the morning than in the afternoon.","I'd rather not say."],trap:"Base verb, no TO: I'd rather GO (not \"to go\").",q:{q:"« Je préférerais attendre » =",o:["I'd rather wait.","I'd rather to wait.","I rather waiting.","I'd rather waited."],b:0,x:"I'd rather + base verb."}},
{p:"I'd better…",m:"Say what you should do (or risk consequences).",s:"I'd better + base verb",ex:["I'd better leave now — the bus is coming.","You'd better call the landlord today.","We'd better double-check the form."],trap:"No TO: I'd better GO. Stronger than \"should\" — there's a consequence.",q:{q:"\"The store closes in 10 minutes.\" →",o:["I'd better hurry!","I'd better to hurry!","I better hurrying!","I would better hurry to!"],b:0,x:"I'd better + base verb = urgent self-advice."}},
{p:"I'm used to… / Get used to…",m:"Talk about habits (being vs becoming).",s:"be/get used to + noun or verb-ING",ex:["I'm used to the cold now.","I'm getting used to speaking English every day.","You'll get used to it!"],trap:"After used to → -ING! \"I'm used to work early\" ❌ → working ✔. (Different from \"I used to work\" = j'avais l'habitude, past.)",q:{q:"« Je m'habitue à conduire l'hiver » =",o:["I'm getting used to driving in winter.","I get used to drive in winter.","I used to driving in winter.","I'm used for drive winter."],b:0,x:"get used to + -ING = becoming comfortable with."}},
{p:"Looking forward to…",m:"Express positive anticipation.",s:"look forward to + noun / verb-ING",ex:["I look forward to hearing from you.","I'm looking forward to the weekend!","We look forward to meeting you."],trap:"TO + -ING here! \"I look forward to hear\" ❌ → to hearING ✔.",q:{q:"The professional email closing:",o:["I look forward to hearing from you.","I look forward to hear from you.","I looking forward hear you.","I forward to you."],b:0,x:"to hearING — the exception francophones must memorize."}},
{p:"It's worth…",m:"Say something deserves the effort.",s:"It's worth + noun / verb-ING",ex:["It's worth a try!","This museum is worth visiting.","It's not worth arguing about."],trap:"worth + -ING: worth visitING (no \"to visit\").",q:{q:"« Ça vaut la peine d'essayer » =",o:["It's worth a try.","It worths to try.","It's worth to try.","It values the pain."],b:0,x:"It's worth a try / worth trying."}},
{p:"There's no point…",m:"Say something is useless.",s:"There's no point (in) + verb-ING",ex:["There's no point waiting — the office is closed.","There's no point in arguing.","There was no point calling again."],trap:"+ -ING, never \"no point to wait\".",q:{q:"« Ça ne sert à rien d'attendre » =",o:["There's no point waiting.","There's no point to wait.","It serves nothing to wait.","No point for waiting is."],b:0,x:"There's no point + -ING."}},
{p:"As soon as…",m:"Link two events in time (dès que).",s:"As soon as + subject + verb",ex:["Call me as soon as you arrive.","As soon as I get the results, I'll let you know.","I'll start as soon as possible (ASAP)."],trap:"Future meaning but PRESENT verb after: as soon as you ARRIVE (not \"will arrive\").",q:{q:"« Dès que tu arrives, appelle-moi » =",o:["As soon as you arrive, call me.","As soon as you will arrive, call me.","Soon you arrive, call me.","As fast you arrive, call."],b:0,x:"No WILL after as soon as!"}},
{p:"Even though…",m:"Contrast two facts (bien que / même si).",s:"Even though + subject + verb",ex:["Even though it was cold, we walked.","She got the job even though she was nervous.","Even though I'm tired, I'll finish tonight."],trap:"Even though + fact. (\"Even if\" = hypothesis: même si un jour…)",q:{q:"« Même s'il faisait froid, on a marché » =",o:["Even though it was cold, we walked.","Even it was cold, we walked.","Despite it was cold, we walked.","Although despite cold, we walk."],b:0,x:"Even though + complete sentence."}},
{p:"In order to…",m:"Express purpose (afin de).",s:"in order to + base verb",ex:["I'm taking classes in order to improve my English.","In order to apply, you need two references.","She moved in order to be closer to work."],trap:"Simply \"to\" works too: I'm taking classes to improve…",q:{q:"« Afin d'améliorer mon anglais » =",o:["In order to improve my English","In order for improve my English","For to improve my English","In order that improving English"],b:0,x:"in order to + base verb (or just \"to\")."}},
{p:"Not only… but also…",m:"Emphasize two qualities.",s:"not only X but also Y",ex:["She's not only bilingual but also very organized.","The apartment is not only affordable but also close to transit.","He not only finished on time but also under budget."],trap:"Powerful in interviews and cover letters — instant B2 impression!",q:{q:"Complete: \"This role is not only interesting ___ well paid.\"",o:["but also","and also but","but too","also but"],b:0,x:"not only… BUT ALSO — fixed pair."}},
{p:"The more… the more…",m:"Two things growing together (plus… plus…).",s:"The more X, the more Y",ex:["The more you practice, the more confident you become.","The more I learn, the more I love it.","The sooner, the better!"],trap:"THE is mandatory on both sides. Bonus classic: The sooner, the better!",q:{q:"« Plus tu pratiques, plus tu progresses » =",o:["The more you practice, the more you improve.","More you practice, more you improve.","The more you practice, more you improving.","Plus you practice, plus improve."],b:0,x:"The more…, the more… — double THE."}},
{p:"I can't wait to…",m:"Enthusiastic anticipation (j'ai hâte).",s:"I can't wait to + base verb / for + noun",ex:["I can't wait to start my new job!","I can't wait for the weekend.","She can't wait to see you."],trap:"Positive! It means excitement, not impatience or anger.",q:{q:"« J'ai hâte de commencer » =",o:["I can't wait to start!","I can't attend to start!","I don't wait starting!","I have haste to start!"],b:0,x:"can't wait to + verb = pure enthusiasm."}},
{p:"It depends on…",m:"Nuance your answer.",s:"It depends on + noun / whether…",ex:["It depends on the schedule.","It depends on whether the bus is on time.","— Cash or card? — It depends on the amount."],trap:"Depends ON (not \"of\"!). « Ça dépend de » → depends ON.",q:{q:"« Ça dépend du prix » =",o:["It depends on the price.","It depends of the price.","It depends the price.","It's depending from price."],b:0,x:"depend ON — the preposition trap."}}
];
function renderPatterns(){
  if(S.pattId!==null&&S.pattId!==undefined&&PATTERNS[S.pattId])return renderPattDetail();
  return retour("Learn","goSub(null)")+
  '<div class="sur">English Patterns</div>'+
  '<div class="titre-vue">🧩 The structures natives use every day</div>'+
  '<div class="note">Master these '+PATTERNS.length+' patterns and half of everyday English is yours. Tap one — and ⭐ the ones you want in your Bank.</div>'+
  PATTERNS.map(function(x,i){
    return '<div class="carte gcarte" onclick="S.pattId='+i+';render();window.scrollTo(0,0)">'+
    '<div class="gico" style="background:var(--violetL)">🧩</div>'+
    '<div class="gtxt"><div class="gtit">'+esc(x.p)+'</div><div class="gdesc">'+esc(x.m)+'</div></div>'+
    '<span onclick="event.stopPropagation();bankToggleP('+i+')">'+starHtml("pattern",x.p)+'</span>'+
    '<div class="gfle">→</div></div>';
  }).join("");
}
function renderPattDetail(){
  var x=PATTERNS[S.pattId];var key="patt"+S.pattId;var rep=S.revAns[key];
  return retour("Patterns","S.pattId=null;render()")+
  '<div style="display:flex;align-items:flex-start;gap:10px">'+
  '<div class="titre-vue" style="font-size:1.5rem;flex:1">'+esc(x.p)+'</div>'+
  '<span onclick="bankToggleP('+S.pattId+')" style="margin-top:8px">'+starHtml("pattern",x.p)+'</span></div>'+
  '<div class="note">'+esc(x.m)+'</div>'+
  card('<div class="sur">🧱 Structure</div><div style="font-family:var(--police-titre);font-weight:700;font-size:1.02rem;color:var(--marine);margin-top:4px">'+esc(x.s)+'</div>')+
  card('<div class="sur">✨ Examples</div>'+x.ex.map(function(e){
    return '<div style="display:flex;align-items:center;gap:8px;margin-top:8px">'+

function pearPlay(){

    '<div style="font-size:.78rem;color:var(--rouge)">🚨 '+esc(m[2])+'</div></div></div>';
  }).join("")+
  '<button class="btn btn-or btn-bloc" onclick="goTab(\'coach\');coachPush(\'Let\\\'s practice the word &quot;'+esc(w.w)+'&quot; in its different meanings. Give me 4 short fill-in-the-blank sentences, one at a time, using a different meaning each time, and correct my answers.\')">🤖 Practice with Nelly AI</button>'+
  '<div style="display:flex;gap:8px;margin-top:10px">'+
  (S.wcId>0?'<button class="btn btn-blanc" style="flex:1" onclick="S.wcId--;render();window.scrollTo(0,0)">← Previous</button>':'')+
  (S.wcId<WC.length-1?'<button class="btn btn-marine" style="flex:1" onclick="S.wcId++;render();window.scrollTo(0,0)">Next →</button>':'')+'</div>';
}
</script>

<script>
/* ═══════════════════════════════════════════════════════════════
   ANGLOVIE — THE ROADMAP FINALE
   🧲 Collocations · 🆚 Confusing Words · 🍁 Canada Survival Kit
   ═══════════════════════════════════════════════════════════════ */
S.colId=null;S.cwId=null;S.skId=null;S.skStep=0;

/* ── 🧲 COLLOCATIONS ─────────────────────────────────────────── */
var COL=[
{cat:"Work & Decisions",icon:"💼",items:[
 ["make a decision","She had to make a decision quickly.","NOT 'take a decision' — a classic francophone trap!"],
 ["take responsibility","He took responsibility for the mistake.","NOT 'take the responsibility' — no article here."],
 ["meet expectations","The report didn't meet expectations.","Formal, workplace-standard phrase."],
 ["raise awareness","The campaign aims to raise awareness.","'Raise', not 'rise' — raise is transitive!"],
 ["reach a conclusion","After the review, we reached a conclusion.","'Reach', not 'arrive at' (though that works too)."]]},
{cat:"Everyday Life",icon:"🏙️",items:[
 ["catch a bus","I need to catch the 8 o'clock bus.","'Catch' for buses/trains — 'take' works too, but 'catch' is more natural for a specific time."],
 ["heavy traffic","There's heavy traffic on the highway today.","NOT 'big traffic' — heavy is the word."],
 ["strong coffee","I like my coffee strong in the morning.","NOT 'hard coffee' — strong for taste/intensity."],
 ["highly recommended","This restaurant is highly recommended.","NOT 'strongly recommended' for this context."],
 ["run errands","I have to run a few errands after work.","The natural way to say 'do small tasks outside'."]]},
{cat:"Feelings & Opinions",icon:"💬",items:[
 ["strongly believe","I strongly believe this is the right choice.","NOT 'hardly believe' — different meaning entirely!"],
 ["deeply grateful","We are deeply grateful for your support.","'Deeply', not 'deep' — adverb before adjective."],
 ["fully aware","I'm fully aware of the risks.","NOT 'totally aware' — 'fully' is the natural pairing."],
 ["completely different","The two proposals are completely different.","Common intensifier pairing."],
 ["closely related","The two issues are closely related.","NOT 'near related' — closely is the collocate."]]},
{cat:"Time & Effort",icon:"⏳",items:[
 ["spend time","I spent a lot of time preparing this.","NOT 'pass time' for this meaning (that means something else)."],
 ["waste time","Don't waste time on that — it's not worth it.","The opposite of 'spend time' wisely."],
 ["save time","This shortcut will save us time.","'Save', not 'economize' time in English."],
 ["put in the effort","She really put in the effort this quarter.","Very natural workplace praise phrase."],
 ["take your time","No rush — take your time.","A warm, reassuring everyday phrase."]]}
];
function renderCollocations(){
  if(S.colId!==null&&S.colId!==undefined&&COL[S.colId])return renderColDetail();
  return retour("Learn","goSub(null)")+
  '<div class="sur">Collocations</div>'+
  '<div class="titre-vue">🧲 Words that stick together</div>'+
  '<div class="note">English word pairs that just "go together" — get them wrong and you sound unnatural, even if grammatically correct.</div>'+
  COL.map(function(c,i){
    return '<div class="carte gcarte" onclick="S.colId='+i+';render();window.scrollTo(0,0)">'+
    '<div class="gico" style="background:var(--ieltsL,#E8F4F8)">'+c.icon+'</div>'+
    '<div class="gtxt"><div class="gtit">'+esc(c.cat)+'</div><div class="gdesc">'+c.items.map(function(x){return x[0];}).slice(0,3).join(" · ")+'…</div></div>'+
    '<div class="gfle">→</div></div>';
  }).join("");
}
function bankToggleCol(ci,ii){var x=COL[ci].items[ii];bankToggle("collocation",x[0],x[1]);}
function renderColDetail(){
  var c=COL[S.colId];
  return retour("Collocations","S.colId=null;render()")+
  '<div style="background:#E8F4F8;border-radius:14px;padding:14px 16px;margin-bottom:12px">'+
  '<div style="font-size:.66rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#1F6F8B">Collocations</div>'+
  '<div style="font-family:var(--police-titre);font-size:1.3rem;font-weight:900;color:var(--marine)">'+c.icon+' '+esc(c.cat)+'</div></div>'+
  c.items.map(function(x,ii){
    return '<div class="carte">'+
    '<div style="display:flex;align-items:center;gap:9px">'+
    '<button onclick="speakEn(\''+esc(x[0]).replace(/'/g,"\\'")+'\')" style="background:#E8F4F8;border:none;border-radius:9px;width:32px;height:32px;font-size:14px;cursor:pointer;flex-shrink:0">🔊</button>'+
    '<div style="flex:1;font-family:var(--police-titre);font-weight:800;font-size:1rem;color:var(--marine)">'+esc(x[0])+'</div>'+
    '<span onclick="bankToggleCol('+S.colId+','+ii+')">'+starHtml("collocation",x[0])+'</span></div>'+
    '<div style="margin-top:8px;padding-left:6px;border-left:3px solid #1F6F8B">'+
    '<div style="font-size:.82rem;margin-bottom:4px">💬 <em>'+esc(x[1])+'</em></div>'+
    '<div style="font-size:.78rem;color:var(--rouge)">🚨 '+esc(x[2])+'</div></div></div>';
  }).join("")+
  '<button class="btn btn-or btn-bloc" onclick="goTab(\'coach\');coachPush(\'Let\\\'s practice the collocations in &quot;'+esc(c.cat)+'&quot;. Give me 4 fill-in-the-blank sentences, one at a time, and correct my answers.\')">🤖 Practice with Nelly AI</button>'+
  '<div style="display:flex;gap:8px;margin-top:10px">'+
  (S.colId>0?'<button class="btn btn-blanc" style="flex:1" onclick="S.colId--;render();window.scrollTo(0,0)">← Previous</button>':'')+
  (S.colId<COL.length-1?'<button class="btn btn-marine" style="flex:1" onclick="S.colId++;render();window.scrollTo(0,0)">Next →</button>':'')+'</div>';
}

/* ── 🆚 CONFUSING WORDS ──────────────────────────────────────── */
var CW=[
{a:"Say",b:"Tell",icon:"🗣️",rule:"TELL needs a person right after it. SAY does not.",
 ex:["She said hello. (no person right after)","She told me hello. (person: 'me')","Tell me the truth.","Say something!"],
 wrong:"❌ She said me hello. → ✅ She told me hello."},
{a:"Work",b:"Job",icon:"💼",rule:"JOB is a specific position (countable). WORK is the general activity or effort (uncountable).",
 ex:["I have a new job at the hospital.","I have a lot of work to do today.","She's looking for a job.","This project needs more work."],
 wrong:"❌ I have a new work. → ✅ I have a new job."},
{a:"Do",b:"Make",icon:"🛠️",rule:"DO = general activities/tasks. MAKE = creating or producing something.",
 ex:["I do my homework every evening.","I make dinner for the family.","She does the dishes.","He makes decisions quickly."],
 wrong:"❌ I make my homework. → ✅ I do my homework."},
{a:"Bring",b:"Take",icon:"🎁",rule:"BRING = toward the speaker/here. TAKE = away from the speaker/there.",
 ex:["Bring your ID to the interview. (to that place)","Take your umbrella with you. (away from here)","Can you bring me some water? (to me)","I'll take the documents to the office. (away)"],
 wrong:"❌ Bring this to the office when you leave. → ✅ Take this to the office when you leave."},
{a:"Hear",b:"Listen",icon:"👂",rule:"HEAR = sounds reach your ears passively. LISTEN = active attention, and needs 'to' + object.",
 ex:["I hear music from next door.","I'm listening to the radio.","Did you hear that noise?","Listen to me carefully."],
 wrong:"❌ I'm listening music. → ✅ I'm listening TO music."},
{a:"See / Watch / Look",b:"",icon:"👀",rule:"SEE = passive (it just appears). WATCH = active, for moving things (TV, sports). LOOK (AT) = deliberate, brief attention.",
 ex:["I see a bird outside.","I'm watching a movie tonight.","Look at this photo!","I watched the whole game."],
 wrong:"❌ I'm seeing TV right now. → ✅ I'm watching TV right now."},
{a:"Borrow",b:"Lend",icon:"🔄",rule:"BORROW = you take/receive. LEND = you give/provide. Opposite directions!",
 ex:["Can I borrow your pen?","Can you lend me your pen?","I borrowed money from my brother.","He lent me his car for the weekend."],
 wrong:"❌ Can you borrow me your pen? → ✅ Can you lend me your pen?"},
{a:"Since",b:"For",icon:"⏱️",rule:"SINCE + a specific point in time (2020, Monday, last year). FOR + a duration (3 years, two weeks).",
 ex:["I've lived here since 2022.","I've lived here for three years.","She's worked there since January.","He's been studying for two hours."],
 wrong:"❌ I've lived here since three years. → ✅ I've lived here for three years."},
{a:"Yet",b:"Already",icon:"⏳",rule:"YET = negative/questions, means 'up to now' (goes at the end). ALREADY = positive sentences, means 'before now/sooner than expected'.",
 ex:["I haven't finished yet.","Have you eaten yet?","I've already finished the report.","She's already left for the airport."],
 wrong:"❌ I have already finish yet. → ✅ I haven't finished yet. / I've already finished."},
{a:"Affect",b:"Effect",icon:"⚡",rule:"AFFECT is (usually) a verb — to influence. EFFECT is (usually) a noun — the result.",
 ex:["The weather affects my mood.","The medication had a positive effect.","Stress can affect your health.","We saw the effects of the policy."],
 wrong:"❌ The effect of the noise affects me. → ✅ The noise affects me. / The effect of the noise is clear."}
];
function renderConfusing(){
  if(S.cwId!==null&&S.cwId!==undefined&&CW[S.cwId])return renderCwDetail();
  return retour("Learn","goSub(null)")+
  '<div class="sur">Confusing Words</div>'+
  '<div class="titre-vue">🆚 Stop mixing these up</div>'+
  '<div class="note">'+CW.length+' word pairs that trip up even advanced learners — with the rule that fixes it forever.</div>'+
  CW.map(function(c,i){
    return '<div class="carte gcarte" onclick="S.cwId='+i+';render();window.scrollTo(0,0)">'+
    '<div class="gico" style="background:var(--rougeL)">'+c.icon+'</div>'+
    '<div class="gtxt"><div class="gtit">'+esc(c.a)+(c.b?' vs '+esc(c.b):'')+'</div><div class="gdesc">'+esc(c.rule.split(".")[0])+'.</div></div>'+
    '<div class="gfle">→</div></div>';
  }).join("");
}
function renderCwDetail(){
  var c=CW[S.cwId];
  return retour("Confusing Words","S.cwId=null;render()")+
  '<div style="background:var(--rougeL);border-radius:14px;padding:14px 16px;margin-bottom:12px">'+
  '<div style="font-size:.66rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--rouge)">Confusing Words</div>'+
  '<div style="font-family:var(--police-titre);font-size:1.35rem;font-weight:900;color:var(--marine)">'+c.icon+' '+esc(c.a)+(c.b?' <span style="color:var(--gris);font-weight:600">vs</span> '+esc(c.b):'')+'</div></div>'+
  card('<div class="sur">📏 The rule</div><div style="font-size:.88rem;margin-top:4px">'+esc(c.rule)+'</div>')+
  card('<div class="sur">✨ Examples</div>'+c.ex.map(function(e){
    return '<div style="display:flex;align-items:center;gap:8px;margin-top:8px">'+
    '<button onclick="speakEn(\''+esc(e).replace(/'/g,"\\'")+'\')" style="background:var(--rougeL);border:none;border-radius:8px;width:30px;height:30px;font-size:13px;cursor:pointer;flex-shrink:0">🔊</button>'+
    '<div style="font-size:.88rem;font-style:italic">'+esc(e)+'</div></div>';
  }).join(""))+
  card('<div class="sur" style="color:var(--rouge)">🚨 The classic mistake</div><div style="font-size:.86rem;margin-top:4px">'+esc(c.wrong)+'</div>')+
  '<button class="btn btn-or btn-bloc" onclick="goTab(\'coach\');coachPush(\'Let\\\'s practice &quot;'+esc(c.a)+(c.b?" vs "+esc(c.b):"")+'&quot;. Give me 4 sentences with a blank where I choose the correct word, one at a time, and correct my answers.\')">🤖 Practice with Nelly AI</button>'+
  '<div style="display:flex;gap:8px;margin-top:10px">'+
  (S.cwId>0?'<button class="btn btn-blanc" style="flex:1" onclick="S.cwId--;render();window.scrollTo(0,0)">← Previous</button>':'')+
  (S.cwId<CW.length-1?'<button class="btn btn-marine" style="flex:1" onclick="S.cwId++;render();window.scrollTo(0,0)">Next →</button>':'')+'</div>';
}

/* ── 🍁 CANADA SURVIVAL KIT ──────────────────────────────────── */
var SK=[
{t:"Open a bank account",icon:"🏦",vocab:[["a void cheque","a blank cheque used to set up direct deposit"],["a SIN (Social Insurance Number)","required to open most accounts"],["overdraft protection","a safety net if you spend more than you have"],["direct deposit","automatic payment into your account"],["a debit card","for everyday purchases, linked to your account"]],
 dialogue:[["Agent","Hi, welcome! Are you looking to open a new account today?"],["You","Yes, I just moved to Canada and I'd like a chequing account."],["Agent","Great, do you have your SIN and a piece of ID with you?"],["You","Yes, here's my passport and my SIN letter."],["Agent","Perfect. Would you also like a savings account or a credit card?"]]},
{t:"Rent an apartment",icon:"🏠",vocab:[["a lease","the rental contract, usually 12 months"],["first and last month's rent","common deposit requirement"],["utilities included / extra","check what's covered (heat, water, electricity)"],["a landlord / a tenant","the owner / the renter"],["a reference letter","proof from a previous landlord or employer"]],
 dialogue:[["Landlord","Hi, thanks for coming to see the apartment."],["You","Thank you for having me. Is heating included in the rent?"],["Landlord","Yes, heating and water are included. Electricity is extra."],["You","Great. What would I need to apply?"],["Landlord","A credit check, proof of income, and two references."]]},
{t:"Visit a doctor",icon:"🏥",vocab:[["a family doctor / a walk-in clinic","regular doctor vs. no-appointment clinic"],["a health card (OHIP)","your provincial health insurance card"],["a referral","needed to see a specialist"],["symptoms","what you're feeling (pain, fever, cough…)"],["a prescription","for medication from the pharmacy"]],
 dialogue:[["Receptionist","Good morning, do you have an appointment?"],["You","No, I don't have a family doctor yet — is this a walk-in clinic?"],["Receptionist","Yes it is. Can I see your health card, please?"],["You","I just arrived, I don't have one yet — is that a problem?"],["Receptionist","No problem, we can still see you today. Please have a seat."]]},
{t:"Call Service Canada",icon:"📞",vocab:[["Service Canada","federal services: SIN, EI, pension, passports"],["EI (Employment Insurance)","benefits if you lose your job"],["an appointment / a file number","booking + your case reference"],["hold time","how long you wait on the phone"],["to be transferred","moved to another department/agent"]],
 dialogue:[["Agent","Thank you for calling Service Canada, how can I help you?"],["You","Hi, I'd like to apply for a Social Insurance Number."],["Agent","Sure. Do you have your immigration documents with you?"],["You","Yes, I have my permanent resident card."],["Agent","Perfect, you can apply online or visit a Service Canada office."]]},
{t:"Call ServiceOntario",icon:"🏛️",vocab:[["ServiceOntario","provincial services: driver's licence, health card, ID"],["a G1 / G2 / G licence","Ontario's graduated driving licence levels"],["a knowledge test","the written test to get your G1"],["an appointment booking","many services need one now"],["a wait time","how long until the next available slot"]],
 dialogue:[["Agent","ServiceOntario, how may I assist you?"],["You","Hi, I'd like to book an appointment for my driving test."],["Agent","Sure, are you booking a G1 knowledge test or a road test?"],["You","The G1 knowledge test, please."],["Agent","I have an opening this Thursday at 2 p.m. — does that work?"]]},
{t:"Buy a car / Go to a garage",icon:"🚗",vocab:[["a used car","a second-hand vehicle"],["a safety certificate","required to sell/register a used car"],["a warranty","protection covering repairs"],["an oil change","routine maintenance"],["a quote / an estimate","the expected repair cost"]],
 dialogue:[["Mechanic","Hi there, what can I do for you today?"],["You","My car is making a strange noise when I brake."],["Mechanic","Okay, let's take a look. Could be the brake pads."],["You","How much would that cost, roughly?"],["Mechanic","I'll give you a quote once I've checked — should be ready in an hour."]]},
{t:"Speak with a teacher",icon:"🏫",vocab:[["a parent-teacher meeting","a scheduled conversation about your child's progress"],["report card","the official grades document"],["homework","schoolwork done at home"],["an IEP (Individualized Education Plan)","extra support plan for some students"],["a field trip","a school outing"]],
 dialogue:[["Teacher","Thanks for coming in! Overall, your daughter is doing really well."],["You","That's great to hear. Is there anything she should work on?"],["Teacher","Her reading has improved a lot. Math could use a bit more practice."],["You","Do you have any resources we could use at home?"],["Teacher","Yes, I'll send you a link to some extra worksheets."]]},
{t:"Register a child at school",icon:"📚",vocab:[["proof of address","a utility bill or lease to confirm where you live"],["immunization record","vaccination history required for enrollment"],["birth certificate","required for age verification"],["a school board","the local authority managing schools"],["French Immersion","a program teaching mostly in French"]],
 dialogue:[["Staff","Hello, welcome! Are you registering a new student today?"],["You","Yes, my son is 7 and we just moved to the area."],["Staff","Great, do you have proof of address and his birth certificate?"],["You","Yes, and his immunization record too."],["Staff","Perfect, that's everything we need to get started."]]},
{t:"Visit a daycare",icon:"🧸",vocab:[["a daycare / a licensed daycare","childcare, ideally government-licensed"],["a waitlist","many daycares have long waiting lists — apply early!"],["subsidized childcare","reduced-cost care based on income"],["drop-off / pick-up times","the daily schedule"],["a spot","an available place for a child"]],
 dialogue:[["Staff","Hi, thanks for calling! How can I help?"],["You","Hi, I'd like to ask about availability for my daughter, she's 2."],["Staff","Let me check — we currently have a short waitlist for that age."],["You","How long is the wait usually?"],["Staff","It varies, but I'd recommend applying now to secure your spot."]]}
];
function renderSurvival(){
  if(S.skId!==null&&S.skId!==undefined&&SK[S.skId])return renderSkDetail();
  return retour("Learn","goSub(null)")+
  '<div class="sur">Canada Survival Kit</div>'+
  '<div class="titre-vue">🍁 Your first-year toolkit</div>'+
  '<div class="note">'+SK.length+' real newcomer situations — vocabulary, a model dialogue, and an AI simulation for each.</div>'+
  SK.map(function(s,i){
    return '<div class="carte gcarte" onclick="S.skId='+i+';render();window.scrollTo(0,0)">'+
    '<div class="gico" style="background:var(--goldL)">'+s.icon+'</div>'+
    '<div class="gtxt"><div class="gtit">'+esc(s.t)+'</div><div class="gdesc">'+s.vocab.length+' key terms + dialogue + AI simulation</div></div>'+
    '<div class="gfle">→</div></div>';
  }).join("");
}
function bankToggleSk(si,vi){var v=SK[si].vocab[vi];bankToggle("word",v[0],v[1]);}
function renderSkDetail(){
  var s=SK[S.skId];
  return retour("Canada Survival Kit","S.skId=null;render()")+
  '<div style="background:var(--goldL);border-radius:14px;padding:14px 16px;margin-bottom:12px">'+
  '<div style="font-size:.66rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#8a6d12">Canada Survival Kit</div>'+
  '<div style="font-family:var(--police-titre);font-size:1.3rem;font-weight:900;color:var(--marine)">'+s.icon+' '+esc(s.t)+'</div></div>'+
  card('<div class="sur">🗝️ Key vocabulary</div>'+s.vocab.map(function(v,vi){
    return '<div style="display:flex;align-items:center;gap:8px;background:#FCFBF7;border:1px solid var(--ligne);border-radius:10px;padding:9px 11px;margin-top:8px">'+
    '<button onclick="speakEn(\''+esc(v[0]).replace(/'/g,"\\'")+'\')" style="background:var(--goldL);border:none;border-radius:8px;width:30px;height:30px;font-size:13px;cursor:pointer;flex-shrink:0">🔊</button>'+
    '<div style="flex:1"><span style="font-weight:800;color:var(--marine);font-size:.86rem">'+esc(v[0])+'</span>'+
    '<div style="font-size:.74rem;color:var(--gris)">'+esc(v[1])+'</div></div>'+
    '<span onclick="bankToggleSk('+S.skId+','+vi+')">'+starHtml("word",v[0])+'</span></div>';
  }).join(""))+
  card('<div class="sur">🎭 Model dialogue</div>'+s.dialogue.map(function(d){
    var isYou=d[0]==="You";
    return '<div style="display:flex;'+(isYou?'justify-content:flex-end':'')+';margin-top:8px">'+
    '<div style="max-width:85%;background:'+(isYou?"var(--marine)":"#F2EFE7")+';color:'+(isYou?"#fff":"var(--encre)")+';border-radius:12px;padding:9px 12px;font-size:.85rem">'+
    '<div style="font-size:.68rem;font-weight:800;opacity:.7;margin-bottom:2px">'+esc(d[0])+'</div>'+esc(d[1])+'</div></div>';
  }).join(""))+
  '<button class="btn btn-or btn-bloc" onclick="startSkSim('+S.skId+')">🎬 Simulate this with Nelly AI</button>'+
  '<div style="display:flex;gap:8px;margin-top:10px">'+
  (S.skId>0?'<button class="btn btn-blanc" style="flex:1" onclick="S.skId--;render();window.scrollTo(0,0)">← Previous</button>':'')+
  (S.skId<SK.length-1?'<button class="btn btn-marine" style="flex:1" onclick="S.skId++;render();window.scrollTo(0,0)">Next →</button>':'')+'</div>';
}
function startSkSim(si){
  var s=SK[si];
  goTab('coach');
  coachPush("Let's do a role-play simulation: \""+s.t+"\". You play the other person (agent, landlord, doctor's receptionist, teacher, etc. — whoever fits the situation) and start the conversation naturally. I will respond as the newcomer. Correct my English gently after each of my turns, and keep the conversation realistic and Canadian.");
}
</script>
