<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AngloVie — Learn English. Live Canada. | by Nelly Folefack</title>
<meta name="description" content="AngloVie 2.0 — the Canadian English immersion platform for French speakers. Practice, missions, AI Coach. Created by Nelly Folefack.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,900&family=Public+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--marine:#0F2A44;--marine2:#16395C;--or:#C9A227;--orL:#F0E1B4;--orBg:#FBF4DF;--ivoire:#FBF8F1;--blanc:#fff;--encre:#1C2B3A;--gris:#5B6B7C;--vert:#1E7D53;--vertL:#E6F4EC;--rouge:#B3402F;--rougeL:#FBEAE6;--violet:#6C3483;--violetL:#F5EEF8;--bleu:#1B4F72;--bleuL:#EBF5FB;--ligne:#E7E2D6;--police-titre:'Fraunces',serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Public Sans',sans-serif;background:var(--ivoire);color:var(--encre);line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:var(--police-titre)}
.app{max-width:760px;margin:0 auto;min-height:100vh;padding-bottom:86px}
.topbar{background:linear-gradient(135deg,var(--marine),var(--marine2));color:#fff;padding:16px 18px;position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px}
.topbar .logo{width:38px;height:38px;border-radius:50%;border:2px solid var(--or);display:flex;align-items:center;justify-content:center;font-family:var(--police-titre);font-weight:800;color:var(--or);font-size:.72rem;flex-shrink:0}
.topbar .t1{font-family:var(--police-titre);font-weight:900;font-size:1.05rem;line-height:1.1}
.topbar .t2{font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--orL)}
.contenu{padding:16px 14px 30px;animation:app .25s ease}
@keyframes app{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.carte{background:var(--blanc);border:1.5px solid var(--ligne);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(15,42,68,.04)}
.sur{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--or);font-weight:800;margin-bottom:4px}
.titre-vue{font-size:1.45rem;font-weight:900;color:var(--marine);margin-bottom:4px}
.note{font-size:.85rem;color:var(--gris);margin-bottom:14px}
.btn{display:inline-block;border:none;border-radius:12px;padding:12px 20px;font-size:.92rem;font-weight:800;cursor:pointer;font-family:'Public Sans',sans-serif;text-decoration:none;text-align:center}
.btn-marine{background:var(--marine);color:#fff}
.btn-or{background:var(--or);color:var(--marine)}
.btn-blanc{background:#fff;border:2px solid var(--marine);color:var(--marine)}
.btn-bloc{display:block;width:100%}
.gcarte{display:flex;gap:12px;align-items:center;cursor:pointer;transition:transform .12s}
.gcarte:active{transform:scale(.985)}
.gico{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.gtxt{flex:1}.gtit{font-size:.98rem;font-weight:800;color:var(--marine)}
.gdesc{font-size:.78rem;color:var(--gris);margin-top:1px}
.gfle{color:var(--or);font-weight:900}
.badge-niv{color:#fff;border-radius:6px;padding:2px 8px;font-size:.62rem;font-weight:900;letter-spacing:.05em}
.barre{height:8px;background:#EDE8DB;border-radius:5px;overflow:hidden}
.barre>div{height:100%;background:linear-gradient(90deg,var(--or),#E0BE4E);border-radius:5px;transition:width .4s}
.stat{background:var(--blanc);border:1.5px solid var(--ligne);border-radius:14px;padding:14px;text-align:center}
.stat .v{font-family:var(--police-titre);font-size:1.5rem;font-weight:900;color:var(--marine)}
.stat .l{font-size:.68rem;color:var(--gris);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-top:2px}
.navbas{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1.5px solid var(--ligne);display:flex;max-width:760px;margin:0 auto;z-index:60}
.navbas button{flex:1;background:none;border:none;padding:9px 2px 10px;font-size:.6rem;font-weight:800;color:#9AA7B4;cursor:pointer;font-family:'Public Sans',sans-serif}
.navbas button .i{display:block;font-size:19px;margin-bottom:2px}
.navbas button.actif{color:var(--marine)}
.navbas button.actif .i{transform:scale(1.12)}
.pill{display:inline-block;background:var(--orBg);border:1px solid var(--or);color:#8a6d12;border-radius:20px;padding:4px 11px;font-size:.7rem;font-weight:800;margin:0 6px 6px 0}
input,select,textarea{font-family:'Public Sans',sans-serif}
.champ{margin-bottom:12px}
.champ label{display:block;font-size:.68rem;font-weight:800;color:#333;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.champ input,.champ select{width:100%;border:2px solid #DDD8CC;border-radius:10px;padding:12px 13px;font-size:.95rem;outline:none;background:#fff}
.chat-zone{background:#fff;border:1.5px solid var(--ligne);border-radius:14px;padding:12px;min-height:230px;max-height:52vh;overflow-y:auto;margin-bottom:10px}
.bulle{max-width:86%;padding:9px 12px;border-radius:13px;font-size:.86rem;line-height:1.55;margin-bottom:8px;white-space:pre-wrap}
.bulle.moi{background:var(--marine);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.bulle.ia{background:#F2EFE7;color:var(--encre);border-bottom-left-radius:4px}
.portail{position:fixed;inset:0;z-index:200;background:linear-gradient(150deg,var(--marine) 0%,var(--marine2) 100%);display:flex;align-items:center;justify-content:center;padding:22px;text-align:center;overflow-y:auto}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">EN</div>
    <div style="flex:1">
      <div class="t1">AngloVie</div>
      <div class="t2">by Nelly Folefack · Learn English. Live Canada.</div>
    </div>
    <button onclick="goTab('coach')" style="background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.3);color:#fff;border-radius:20px;padding:7px 13px;font-size:.72rem;font-weight:800;cursor:pointer">🤖 AI Coach</button>
  </div>
  <div id="zone" class="contenu"></div>
  <div class="navbas" id="navbas"></div>
</div>

<script>
/* ═══════════ ANGLOVIE 2.0 — CORE ═══════════ */
var API_URL="/.netlify/functions/claude";
var SYNC_URL="https://script.google.com/macros/s/AKfycbxLkgoxAW5M9-Nvgwh40sDJyXGGmu1AQpjFIiYzd2tDp64Xru5ojjLjZHf9Scr03zcIKQ/exec";
var CODES=["NELLYF-EN-2026","NF-EN-001","NF-EN-002","NF-EN-003","NF-EN-004","NF-EN-005","NF-EN-006","NF-EN-007","NF-EN-008","NF-EN-009","NF-EN-010","NF-EN-011","NF-EN-012","NF-EN-013","NF-EN-014","NF-EN-015","NF-EN-016","NF-EN-017","NF-EN-018","NF-EN-019","NF-EN-020"];
var WHATSAPP="https://wa.me/17058964060?text=Hi%20Nelly%2C%20I%20would%20like%20to%20join%20AngloVie!";
var LIEN_RESERVATION="https://calendar.app.google/iwir4r8N8osTrGd49";

var C={navy:"#0F2A44",teal:"#1A7A7A",tealL:"#E8F5F5",purple:"#6C3483",purpleL:"#F5EEF8",gold:"#C9A227",goldL:"#FBF4DF",green:"#1E7D53",greenL:"#E6F4EC",red:"#B3402F",redL:"#FBEAE6",blue:"#1B4F72",blueL:"#EBF5FB",mid:"#5B6B7C",dark:"#1C2B3A"};

var S={code:null,screen:"password",tab:"home",sub:null,
  prenom:"",nom:"",courriel:"",pays:"",niveau:"A2",cible:"B2",dateDebut:"",dateFin:"",profilOk:false,
  revDone:{},revId:null,revAns:{},revNiveau:"tous",revCat:null,
  situationsDone:{},situId:null,situStep:0,situAns:{},situChat:[],situBusy:false,playing:false,
  canId:null,coachChat:[],coachBusy:false,tempsEtude:0,joursEtude:[],
  expandCE:{},dailyDone:{}};
var SAVE_KEYS=["prenom","nom","courriel","pays","niveau","cible","dateDebut","dateFin","profilOk","revDone","situationsDone","tempsEtude","joursEtude","dailyDone"];

function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function card(inner){return '<div class="carte">'+inner+'</div>';}
function cle(){return "anglovie2-"+(S.code||"anon");}
function sauver(){try{var d={};SAVE_KEYS.forEach(function(k){d[k]=S[k];});localStorage.setItem(cle(),JSON.stringify(d));}catch(e){}}
function charger(){try{var b=localStorage.getItem(cle());if(b){var d=JSON.parse(b);SAVE_KEYS.forEach(function(k){if(d[k]!==undefined)S[k]=d[k];});}}catch(e){}}
function setState(o){for(var k in o)S[k]=o[k];sauver();render();}

function suivi(ev,detail){
  try{fetch(SYNC_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({app:"AngloVie by NF",code:S.code||"",prenom:S.prenom||"",nom:S.nom||"",courriel:S.courriel||"",event:ev,detail:detail||"",date:new Date().toISOString()})}).catch(function(){});}catch(e){}
}
function sendToAgent(ev,detail){suivi(ev,detail);}

async function nellyAPI(body){
  var r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok)throw new Error("API "+r.status);
  return await r.json();
}

/* voix anglaise */
function getEnVoice(){var vs=window.speechSynthesis?window.speechSynthesis.getVoices():[];return vs.filter(function(v){return v.lang==='en-CA';})[0]||vs.filter(function(v){return v.lang==='en-US';})[0]||vs.filter(function(v){return v.lang&&v.lang.indexOf('en')===0;})[0]||null;}
function stopAudio(){if(window.speechSynthesis)window.speechSynthesis.cancel();S.playing=false;render();}

/* minuterie de temps d'étude */
setInterval(function(){if(S.screen==="app"&&!document.hidden){S.tempsEtude=(S.tempsEtude||0)+1;var d=new Date().toISOString().slice(0,10);if((S.joursEtude||[]).indexOf(d)<0){S.joursEtude=(S.joursEtude||[]).concat([d]);}if(S.tempsEtude%60===0)sauver();}},60000);

/* ═══════════ NAVIGATION ═══════════ */
var TABS=[
 {id:"home",icon:"🏠",label:"Home"},
 {id:"learn",icon:"📚",label:"Learn"},
 {id:"missions",icon:"🎭",label:"Missions"},
 {id:"coach",icon:"🤖",label:"AI Coach"},
 {id:"dash",icon:"📊",label:"Dashboard"}
];
function goTab(t){stopAudio();S.tab=t;S.sub=null;S.revId=null;S.situId=null;S.canId=null;sauver();render();window.scrollTo(0,0);}
function goSub(s){stopAudio();S.sub=s;sauver();render();window.scrollTo(0,0);}
function navBas(){
  return TABS.map(function(t){
    return '<button class="'+(S.tab===t.id?'actif':'')+'" onclick="goTab(\''+t.id+'\')"><span class="i">'+t.icon+'</span>'+t.label+'</button>';
  }).join("");
}
function retour(label,fn){return '<button onclick="'+fn+'" style="background:#fff;border:1.5px solid var(--ligne);color:var(--gris);border-radius:10px;padding:8px 14px;font-size:.78rem;font-weight:800;cursor:pointer;margin-bottom:14px">← '+label+'</button>';}

/* ═══════════ PORTAL & PROFILE GATE ═══════════ */
function renderPortail(){
  return '<div class="portail"><div style="max-width:460px;width:100%">'+
  '<div style="width:66px;height:66px;border-radius:50%;border:3px solid var(--or);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-family:var(--police-titre);font-weight:800;color:var(--or);font-size:1rem">EN</div>'+
  '<h1 style="color:#fff;font-size:2rem;font-weight:900;margin-bottom:2px">AngloVie</h1>'+
  '<div style="font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--orL);margin-bottom:8px">by Nelly Folefack</div>'+
  '<p style="color:#fff;font-weight:800;margin-bottom:4px">Learn English. Live Canada.</p>'+
  '<p style="color:#B9C6D6;font-size:.85rem;margin-bottom:22px">Practice English. Build Confidence. Live Canada.</p>'+
  '<div style="background:#fff;border-radius:18px;padding:24px 20px;text-align:left">'+
  '<div style="font-weight:900;color:var(--marine);margin-bottom:4px">🔒 Secure access</div>'+
  '<div style="font-size:.8rem;color:var(--gris);margin-bottom:14px">Enter your personal access code to start your immersion.</div>'+
  '<div style="font-size:.65rem;font-weight:800;color:#333;letter-spacing:.06em;margin-bottom:5px">MY ACCESS CODE</div>'+
  '<input id="pwd" type="text" placeholder="Ex: NF-EN-001" autocomplete="off" onkeydown="if(event.key===\'Enter\')validerCode()" style="width:100%;border:2px solid #DDD8CC;border-radius:10px;padding:13px;font-size:1rem;text-align:center;letter-spacing:1px;outline:none">'+
  '<div id="pwdErr" style="display:none;background:var(--rougeL);color:var(--rouge);border-radius:8px;padding:8px 11px;font-size:.78rem;margin-top:8px">Code not recognized. Please check with Nelly.</div>'+
  '<button class="btn btn-marine btn-bloc" style="margin-top:12px" onclick="validerCode()">Enter →</button>'+
  '</div>'+
  '<p style="color:#8FA3B8;font-size:.78rem;margin:20px 0 10px">No access code yet? Join AngloVie 🌍</p>'+
  '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'+
  '<a href="'+WHATSAPP+'" target="_blank" style="background:#25D366;color:#fff;text-decoration:none;border-radius:10px;padding:11px 17px;font-weight:800;font-size:.85rem">💬 WhatsApp</a>'+
  '<a href="mailto:ucbh.communaute@outlook.com?subject=AngloVie%20Registration" style="background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.35);color:#fff;text-decoration:none;border-radius:10px;padding:11px 17px;font-weight:800;font-size:.85rem">✉️ Email</a></div>'+
  '<div style="margin-top:24px;font-size:.66rem;color:rgba(255,255,255,.4)">© 2026 Nelly Folefack — All rights reserved</div>'+
  '</div></div>';
}
function validerCode(){
  var v=(document.getElementById("pwd").value||"").trim().toUpperCase();
  if(CODES.indexOf(v)<0){document.getElementById("pwdErr").style.display="block";return;}
  S.code=v;try{localStorage.setItem("anglovie2-session",v);}catch(e){}
  charger();
  suivi("connexion","code validated");
  S.screen=S.profilOk?"app":"profile";
  var st=statutPeriode();if(st!=="ok")S.screen="blocked";
  render();
}
function statutPeriode(){
  try{
    var now=new Date();
    if(S.dateDebut&&now<new Date(S.dateDebut+"T00:00:00"))return "avant";
    if(S.dateFin&&now>new Date(S.dateFin+"T23:59:59"))return "apres";
  }catch(e){}
  return "ok";
}
function renderBlocked(){
  var st=statutPeriode();
  return '<div class="portail"><div style="max-width:440px;width:100%">'+
  '<div style="font-size:46px;margin-bottom:12px">'+(st==="avant"?"⏳":"🏁")+'</div>'+
  '<h1 style="color:#fff;font-size:1.7rem;font-weight:900;margin-bottom:12px">AngloVie</h1>'+
  '<div style="background:#fff;border-radius:18px;padding:24px 20px">'+
  '<div style="font-weight:900;color:var(--marine);margin-bottom:8px">'+(st==="avant"?"Your immersion is coming":"Immersion complete")+'</div>'+
  '<div style="font-size:.86rem;color:var(--gris);line-height:1.6">'+(st==="avant"
    ?'Hi '+esc(S.prenom)+'! Your immersion starts on <strong>'+esc(S.dateDebut)+'</strong>. Come back that day — everything will be ready for you.'
    :'Congratulations '+esc(S.prenom)+'! Your immersion ended on <strong>'+esc(S.dateFin)+'</strong>. Keep practicing — and contact Nelly to extend your access.')+'</div>'+
  '<div style="display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap">'+
  '<a href="'+WHATSAPP+'" target="_blank" class="btn" style="background:#25D366;color:#fff">💬 WhatsApp</a>'+
  '<button class="btn btn-blanc" onclick="changerCode()">↩ Another code</button></div>'+
  '</div></div></div>';
}
function changerCode(){try{localStorage.removeItem("anglovie2-session");}catch(e){}S.code=null;S.screen="password";render();}

function renderProfilGate(){
  return '<div style="padding:16px 14px 30px">'+
  '<div class="sur">Welcome to AngloVie</div>'+
  '<div class="titre-vue">'+(S.profilOk?'My profile':'Create your profile')+'</div>'+
  '<div class="note">This information personalizes your journey — and your access period.</div>'+
  card('<div class="sur" style="color:var(--marine)">👤 Your information</div>'+
  '<div class="champ" style="margin-top:10px"><label>First name *</label><input id="f_prenom" value="'+esc(S.prenom)+'" placeholder="Your first name"></div>'+
  '<div class="champ"><label>Last name *</label><input id="f_nom" value="'+esc(S.nom)+'" placeholder="Your last name"></div>'+
  '<div class="champ"><label>Email</label><input id="f_courriel" type="email" value="'+esc(S.courriel)+'" placeholder="you@example.com"></div>'+
  '<div class="champ"><label>Country</label><input id="f_pays" value="'+esc(S.pays)+'" placeholder="Canada, Cameroon, France…"></div>')+
  card('<div class="sur" style="color:var(--marine)">🎯 My level</div>'+
  '<div class="champ" style="margin-top:10px"><label>Current level</label><select id="f_niveau">'+["A1","A2","B1","B2","C1"].map(function(n){return '<option '+(S.niveau===n?'selected':'')+'>'+n+'</option>';}).join("")+'</select></div>'+
  '<div class="champ"><label>Target level</label><select id="f_cible">'+["A2","B1","B2","C1","C2"].map(function(n){return '<option '+(S.cible===n?'selected':'')+'>'+n+'</option>';}).join("")+'</select></div>')+
  card('<div class="sur" style="color:var(--marine)">🗓️ My immersion period *</div>'+
  '<div style="font-size:.76rem;color:var(--gris);margin:6px 0 10px">Access closes automatically at the end of your immersion.</div>'+
  '<div class="champ"><label>Start date *</label><input id="f_debut" type="date" value="'+esc(S.dateDebut)+'"></div>'+
  '<div class="champ"><label>End date *</label><input id="f_fin" type="date" value="'+esc(S.dateFin)+'"></div>')+
  '<button class="btn btn-or btn-bloc" onclick="sauverProfil()">✓ Save and start</button>'+
  (S.profilOk?'<button class="btn btn-blanc btn-bloc" style="margin-top:10px" onclick="S.screen=\'app\';render()">← Back</button>':'')+
  '</div>';
}
function sauverProfil(){
  var g=function(id){var e=document.getElementById(id);return e?e.value.trim():"";};
  S.prenom=g("f_prenom");S.nom=g("f_nom");S.courriel=g("f_courriel");S.pays=g("f_pays");
  S.niveau=g("f_niveau")||"A2";S.cible=g("f_cible")||"B2";S.dateDebut=g("f_debut");S.dateFin=g("f_fin");
  if(!S.prenom||!S.nom||!S.dateDebut||!S.dateFin){alert("Please fill in: first name, last name, start and end dates.");return;}
  S.profilOk=true;sauver();
  suivi("profil_enregistre","Level "+S.niveau+" → "+S.cible+" · Access: "+S.dateDebut+" → "+S.dateFin+" · "+(S.pays||""));
  var st=statutPeriode();
  S.screen=(st==="ok")?"app":"blocked";
  S.tab="home";render();
}

/* ═══════════ HOME ═══════════ */
function renderHome(){
  var nRev=Object.keys(S.revDone||{}).length,nMis=Object.keys(S.situationsDone||{}).length;
  return '<div class="sur">Welcome'+(S.prenom?', '+esc(S.prenom):'')+'</div>'+
  '<div class="titre-vue">Learn English. Live Canada.</div>'+
  '<div class="note">Practice English. Build Confidence. Live Canada. 🇨🇦</div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'+
  '<button class="btn btn-or" onclick="goTab(\'learn\')">▶ Start Learning</button>'+
  '<button class="btn btn-marine" onclick="goTab(\'dash\')">📊 My Dashboard</button>'+
  '<button class="btn btn-blanc" onclick="goTab(\'coach\')">🤖 AI Coach</button>'+
  '<button class="btn btn-blanc" onclick="goTab(\'learn\');goSub(\'daily\')">🎯 Daily Challenge</button></div>'+
  card('<div style="display:flex;gap:14px;text-align:center">'+
  '<div style="flex:1"><div style="font-family:var(--police-titre);font-size:1.4rem;font-weight:900;color:var(--marine)">'+nRev+'</div><div style="font-size:.66rem;color:var(--gris);font-weight:700;text-transform:uppercase">Lessons</div></div>'+
  '<div style="flex:1"><div style="font-family:var(--police-titre);font-size:1.4rem;font-weight:900;color:var(--marine)">'+nMis+'</div><div style="font-size:.66rem;color:var(--gris);font-weight:700;text-transform:uppercase">Missions</div></div>'+
  '<div style="flex:1"><div style="font-family:var(--police-titre);font-size:1.4rem;font-weight:900;color:var(--marine)">'+Math.round((S.tempsEtude||0)/60*10)/10+'h</div><div style="font-size:.66rem;color:var(--gris);font-weight:700;text-transform:uppercase">Study time</div></div></div>')+
  hubCard("📚","Learn","Structure, tenses, traps, vocabulary and more","goTab('learn')",C.blueL)+
  hubCard("🎭","Everyday Missions","Real life in English — with AI role plays","goTab('missions')",C.purpleL)+
  hubCard("🧩","English Patterns","The structures natives use every day","goSub('patterns')",C.purpleL)+

"Ask the AI Coach to correct one sentence you wrote today."];
function dayIndex(mod){var d=new Date();var n=Math.floor(d.getTime()/86400000);return n%mod;}
function renderDaily(){

  card('<div class="sur">🍁 Canadian Culture Tip</div>'+

function dailyOk(){var t=new Date().toISOString().slice(0,10);S.dailyDone[t]=true;suivi("daily_challenge","completed "+t);sauver();render();}

/* ═══════════ 🤖 AI COACH ═══════════ */
var COACH_SYSTEM="You are Nelly AI, the English coach of AngloVie (created by Nelly Folefack) — a Canadian English immersion platform for French speakers. You answer questions about English, explain rules, correct emails and texts (use the format 🔧 wrong → correct), prepare learners for interviews, create exercises on request, and can role-play (employer, doctor, client, banker, teacher, colleague). DEFAULT: answer in natural, warm Canadian English adapted to the learner's level. If the learner clicks 'Explain in French' or asks in French why a rule works, you may explain THE LOGIC briefly in French — especially contrasts with French structures and typical francophone mistakes — then return to English. Never become a permanent translator. The learner has a personal 'English Bank' of saved words, expressions and patterns; when they ask to review it, quiz them one item at a time with warmth. Keep answers short (2-6 sentences) unless asked for more.";
function renderCoach(){
  return '<div class="sur">AI Coach</div>'+
  '<div class="titre-vue">🤖 Nelly AI</div>'+
  '<div class="note">Ask anything about English. Corrections, rules, interview prep, role plays — 24/7.</div>'+
  '<div class="chat-zone" id="coachZone">'+
  (S.coachChat.length===0?'<div style="text-align:center;color:var(--gris);font-size:.82rem;padding:30px 10px">👋 Hi'+(S.prenom?' '+esc(S.prenom):'')+'! I\u2019m Nelly AI.<br>Try: “Correct this sentence: I have 30 years.”<br>or “Role-play: you are my landlord.”</div>':
  S.coachChat.map(function(m){return '<div class="bulle '+(m.role==="user"?"moi":"ia")+'">'+esc(m.content)+'</div>';}).join("")+
  (S.coachBusy?'<div class="bulle ia" style="color:var(--gris)">…</div>':''))+
  '</div>'+
  '<div style="display:flex;gap:8px;margin-bottom:8px">'+
  '<input id="coachInput" type="text" placeholder="Type in English…" onkeydown="if(event.key===\'Enter\')coachSend()" style="flex:1;border:2px solid #DDD8CC;border-radius:12px;padding:12px 14px;font-size:.92rem;outline:none">'+
  '<button class="btn btn-marine" onclick="coachSend()" '+(S.coachBusy?'disabled style="opacity:.5"':'')+'>➤</button></div>'+
  '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
  '<button class="pill" style="cursor:pointer;border:1.5px solid var(--bleu);background:var(--bleuL);color:var(--bleu)" onclick="coachQuick(\'🇫🇷 Explain that in French, please — just the logic of the rule.\')">🇫🇷 Explain in French</button>'+
  '<button class="pill" style="cursor:pointer" onclick="coachQuick(\'Give me a quick exercise for my level ('+S.niveau+').\')">🧩 Give me an exercise</button>'+
  '<button class="pill" style="cursor:pointer" onclick="coachQuick(\'Let\\\'s do a short interview role-play. You are the recruiter.\')">💼 Interview role-play</button>'+
  '<button class="pill" style="cursor:pointer;border:1.5px solid var(--or);background:var(--orBg);color:#8a6d12" onclick="coachReviewBank()">⭐ Review my Bank ('+bankCount()+')</button>'+
  '</div>';
}
function coachQuick(t){var i=document.getElementById("coachInput");if(i){i.value=t;}coachSend();}
async function coachSend(){
  var inp=document.getElementById("coachInput");if(!inp)return;
  var txt=inp.value.trim();if(!txt||S.coachBusy)return;
  inp.value="";
  S.coachChat.push({role:"user",content:txt});S.coachBusy=true;render();scrollCoach();
  try{
    var data=await nellyAPI({model:"claude-sonnet-4-6",max_tokens:700,system:COACH_SYSTEM+" Learner level: "+S.niveau+" aiming for "+S.cible+".",messages:S.coachChat.slice(-16)});
    var rep=(data.content||[]).filter(function(c){return c.type==="text";}).map(function(c){return c.text;}).join("").trim()||"(…)";
    S.coachChat.push({role:"assistant",content:rep});
    suivi("coach_ia","exchange");
  }catch(e){S.coachChat.push({role:"assistant",content:"📵 Connection issue ("+(e.message||"error")+"). Please try again."});}
  S.coachBusy=false;render();scrollCoach();
}
function scrollCoach(){setTimeout(function(){var z=document.getElementById("coachZone");if(z)z.scrollTop=z.scrollHeight;},60);}

/* ═══════════ 📊 DASHBOARD ═══════════ */

  return '<div class="sur">Dashboard</div>'+

  card('<div style="display:flex;justify-content:space-between;font-size:.78rem;font-weight:800;color:var(--gris);margin-bottom:6px"><span>OVERALL PROGRESS</span><span style="color:var(--marine)">'+pct+' %</span></div>'+
  '<div class="barre"><div style="width:'+pct+'%"></div></div>')+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">'+
  '<div class="stat"><div class="v">'+nRev+'/'+totRev+'</div><div class="l">Lessons</div></div>'+
  '<div class="stat"><div class="v">'+nMis+'/'+totMis+'</div><div class="l">Missions</div></div>'+
  '<div class="stat"><div class="v">'+Math.round((S.tempsEtude||0)/60*10)/10+'h</div><div class="l">Study time</div></div>'+
  '<div class="stat"><div class="v">'+streak+'</div><div class="l">Study days</div></div>'+
  '<div class="stat" style="grid-column:1/-1"><div class="v">⭐ '+bankCount()+'</div><div class="l">My English Bank</div></div></div>'+
  card('<div class="sur">🏅 Badges</div>'+
  '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">'+
  badges.map(function(b){return '<div style="flex:1;min-width:130px;background:'+(b[2]?'var(--orBg)':'#F4F2EC')+';border:1.5px solid '+(b[2]?'var(--or)':'#E5E1D5')+';border-radius:12px;padding:10px;text-align:center;opacity:'+(b[2]?'1':'.45')+'"><div style="font-size:20px">'+b[0]+'</div><div style="font-size:.66rem;font-weight:800;color:var(--marine);margin-top:2px">'+b[1]+'</div></div>';}).join("")+'</div>')+
  card('<div class="sur" style="color:var(--vert)">💪 Strengths</div>'+
  '<div style="font-size:.84rem;margin-top:4px">'+(forces.length?forces.join(" · "):"Your strengths appear as you complete lessons!")+'</div>'+
  '<div class="sur" style="color:var(--rouge);margin-top:12px">🎯 Areas to improve</div>'+
  '<div style="font-size:.84rem;margin-top:4px">'+(axes.length?axes.join(" · "):"None — you covered everything!")+'</div>')+
  card('<div class="sur" style="color:var(--violet)">🤖 AI recommendation</div>'+
  '<div style="font-size:.88rem;margin-top:4px">'+esc(reco)+'</div>')+
  '<button class="btn btn-blanc btn-bloc" onclick="S.screen=\'profile\';render()">👤 Edit my profile</button>'+
  '<button class="btn btn-blanc btn-bloc" style="margin-top:8px;color:var(--rouge);border-color:var(--rouge)" onclick="if(confirm(\'Log out of this code?\'))changerCode()">↩ Change access code</button>';
}
</script>

<script>

// ═══════════════════════════════════════════════════════════════
// FRANCOVIE — 🎭 SITUATIONS RÉELLES (remplace le pilier TEF)
// Parcours en 6 étapes : Vocabulaire → Audio → Dialogue interactif
// → Jeu de rôle IA → Exercices → Mission terminée
// ═══════════════════════════════════════════════════════════════

var SITU_COLOR="#6C3483", SITU_BG="#F5EEF8";

var SITUATIONS=[
{id:"groceries",icon:"🛒",label:"Grocery Shopping",desc:"Find it, ask for it, pay for it!",dispo:true,
 vocab:[
  ["an aisle","the corridor between shelves (« une allée »)","\"Which aisle is the rice in?\" — pronounced \"AISLE\" like \"I'll\", the S is silent!"],
  ["on sale","at a reduced price (« en solde »)","\"Chicken is on sale this week.\""],
  ["the checkout / self-checkout","where you pay (« la caisse »)","\"The self-checkout is faster.\""],
  ["a cart / a basket","« un chariot / un panier »","Carts often need a $1 coin."],
  ["the receipt","proof of purchase (« le reçu »)","Pronounced \"ri-SEET\" — silent P! Not the same as recipe (« recette »)."],
  ["dairy products","milk, cheese, yogurt (« produits laitiers »)","\"Dairy is at the back of the store.\""],
  ["\"Paper or plastic?\"","the bag question","The classic checkout ritual."],
  ["\"Debit or credit?\"","the payment question","THE Canadian checkout question."],
  ["a points card / loyalty card","« une carte de points »","\"Do you have a points card?\""],
  ["best before / expiry date","« meilleur avant / date de péremption »","\"Best before July 12\" — a freshness recommendation."]],
 dialogue:[
  {loc:"You",txt:"Hi! Excuse me, which aisle is the flour in?"},
  {loc:"Employee",txt:"Hi there! Aisle 7, with the baking products."},
  {loc:"You",txt:"Thanks! And is the chicken still on sale this week?"},
  {loc:"Employee",txt:"Yes, until Sunday — 8.99 a kilo at the meat counter."},
  {loc:"You",txt:"Perfect. One more question: do you take points cards here?"},
  {loc:"Employee",txt:"Absolutely, just scan it at the checkout before you pay."},
  {loc:"You",txt:"Great, thanks so much for your help!"},
  {loc:"Employee",txt:"My pleasure. Have a good one!"}],
 interactif:[
  {avant:"The employee walks up: \"Hi! Can I help you find something?\"",
   options:["Yes, please! I'm looking for the eggs.","Give eggs.","Eggs where?"],bonne:0,
   exp:"\"I'm looking for… , please\" — the complete, polite request."},
  {avant:"\"They're at the back, with the dairy products. Anything else?\"",
   options:["No, that's all, thanks! Oh wait — do you have reusable bags?","Nothing.","Yes. Bags."],bonne:0,
   exp:"\"That's all, thanks!\" closes politely — then \"Oh wait\" naturally reopens the conversation."},
  {avant:"\"Yes, they're two dollars, right by the checkout.\"",
   options:["Perfect, I'll grab two. Thanks for your help!","OK.","Two. Bye."],bonne:0,
   exp:"\"I'll grab two\" — very natural! (to grab = to take, casual). And always say thanks."}],
 ouverture:"(You walk into the grocery store; an employee is stocking shelves) — Hi there! Can I help you find something?",
 role:"You are a friendly Canadian grocery store employee. The learner is a francophone practicing English while shopping: they ask about product locations, sales, points cards, payment. Answer naturally in 1-2 simple sentences using everyday Canadian English (aisle, on sale, checkout, have a good one). If the learner makes an important English mistake, naturally model the correct form in your reply. If they seem completely lost, you may add a very short French hint in parentheses.",
 exos:[
  {q:"\"On sale\" means the product is:",options:["at a reduced price","sold out","dirty","frozen"],bonne:0,exp:"ON SALE = « en solde ». (Nothing to do with the French « sale »!)"},
  {q:"To ask where a product is:",options:["Which aisle is the sugar in?","Where sugar?","Sugar aisle you have?","The sugar is which?"],bonne:0,exp:"Memorize the structure as is: \"Which aisle is the … in?\""},
  {q:"At the checkout: \"Debit or credit?\" — they're asking about:",options:["your payment method","your postal code","your name","a tip"],bonne:0,exp:"Debit (bank card) or credit (credit card): the Canadian ritual question."},
  {q:"\"Have a good one!\" means:",options:["Have a good day!","Take a good one!","Good luck!","Next customer!"],bonne:0,exp:"The Canadian goodbye. Answer: \"You too!\""}]},

{id:"doctor_en",icon:"🩺",label:"Booking a Doctor's Appointment",desc:"Symptoms, appointments and your health card",dispo:true,
 vocab:[
  ["to book an appointment","« prendre un rendez-vous »","\"I'd like to book an appointment, please.\""],
  ["a walk-in clinic","a clinic with no appointment needed","For non-urgent care when you don't have a family doctor."],
  ["My … hurts / I have a sore …","« j'ai mal à … »","\"My back hurts.\" \"I have a sore throat.\""],
  ["a fever / a cough","« de la fièvre / une toux »","\"My son has a fever and a bad cough.\""],
  ["the health card","your provincial insurance card","\"Can I see your health card?\" — always bring it."],
  ["a prescription","« une ordonnance »","False friend! Not « inscription » (= registration)."],
  ["a family doctor","« un médecin de famille »","\"I don't have a family doctor yet.\""],
  ["to reschedule / to cancel","« reporter / annuler »","\"I need to reschedule my appointment.\""],
  ["Does it hurt when…?","the doctor's typical question","\"Does it hurt when you breathe?\""],
  ["the waiting room","« la salle d'attente »","\"Please have a seat in the waiting room.\""]],
 dialogue:[
  {loc:"Receptionist",txt:"Riverside Clinic, good morning!"},
  {loc:"You",txt:"Good morning! I'd like to book an appointment with Dr. Marchand, please."},
  {loc:"Receptionist",txt:"Of course. What's the reason for your visit?"},
  {loc:"You",txt:"I have a sore throat and I've been coughing for three days."},
  {loc:"Receptionist",txt:"I see. I have tomorrow at 10:15 or Thursday at 2 p.m."},
  {loc:"You",txt:"Tomorrow at 10:15 works for me."},
  {loc:"Receptionist",txt:"Perfect. Please bring your health card and arrive ten minutes early."},
  {loc:"You",txt:"Will do. Do I need to fast before the appointment?"},
  {loc:"Receptionist",txt:"No, not for this visit. See you tomorrow!"},
  {loc:"You",txt:"Thank you so much, see you tomorrow!"}],
 interactif:[
  {avant:"The receptionist: \"What's the reason for your visit?\"",
   options:["My back has been hurting for a week and it's not getting better.","It's private!","Sick."],bonne:0,
   exp:"Symptom + duration: \"has been hurting for a week\" — exactly what she needs to note."},
  {avant:"\"I have Monday at 9 or Wednesday at 4:30.\"",
   options:["Wednesday at 4:30 works better for me — I work Monday mornings.","None of those. Figure it out.","Whatever."],bonne:0,

  {avant:"\"You're all set. Any questions?\"",
   options:["Yes — should I bring anything besides my health card?","No. (click)","Why so many questions?"],bonne:0,
   exp:"\"Should I bring anything…?\" avoids surprises. And \"besides\" = in addition to."}],
 ouverture:"(The phone rings; the receptionist picks up) — Park Clinic, good morning! How can I help you?",
 role:"You are a kind, efficient medical receptionist at a Canadian clinic. The learner is a francophone practicing English: they call to book, reschedule or cancel an appointment. Ask the reason for the visit, offer two time slots, remind them to bring their health card and arrive 10 minutes early. Answer in 1-2 simple sentences. If the learner makes an important English mistake, naturally model the correct form. If they seem completely lost, you may add a very short French hint in parentheses.",
 exos:[
  {q:"« J'ai mal à la gorge » →",options:["I have a sore throat.","I have bad at the throat.","My throat is bad me.","I am sore the throat."],bonne:0,exp:"A SORE THROAT — and for your back: \"my back hurts\"."},
  {q:"To move an appointment to another date, you ask to:",options:["reschedule it","re-appoint it","remove it","replace it"],bonne:0,exp:"RESCHEDULE = « reporter ». (Cancel = « annuler ».)"},
  {q:"\"Arrive ten minutes early\" means: arrive…",options:["10 minutes before your appointment time","at 10:10","10 minutes late","in 10 minutes"],bonne:0,exp:"EARLY = ahead of time (opposite: late)."},
  {q:"\"Prescription\" means:",options:["« une ordonnance »","« une inscription »","« une description »","a religious rule"],bonne:0,exp:"Prescription = the doctor's medication order. Registration = « inscription »!"}]},

{id:"interview_en",icon:"💼",label:"Acing a Job Interview",desc:"Tell me about yourself… with confidence!",dispo:true,
 vocab:[

  ["my strengths / my weaknesses","« mes forces / mes faiblesses »","\"My greatest strength is…\""],
  ["relevant experience","experience that matches the job","\"I have five years of relevant experience.\""],

  ["teamwork / a team player","« le travail d'équipe »","\"I'm a real team player.\""],
  ["availability / When can you start?","« les disponibilités »","Have your answer ready!"],

 interactif:[
  {avant:"The recruiter: \"Why do you want to work with us?\"",
   options:["I read that you invest in employee training — that's exactly the environment I want to grow in, and my customer service experience matches your needs.","Because I need money.","Why not?"],bonne:0,
   exp:"Research on the company + link to your strengths: the answer that scores points."},
  {avant:"\"What's your biggest weakness?\"",

{id:"govcall_en",icon:"☎️",label:"Calling Service Canada",desc:"Phone menus, spelling and reference numbers",dispo:true,

 ouverture:"(After the phone menu and a few minutes on hold, an agent picks up) — Service Canada, good morning! How can I help you?",

{id:"neighbours_en",icon:"👥",label:"Meeting Your Neighbours",desc:"Break the ice, Canadian style!",dispo:true,
 vocab:[
  ["to move in","« emménager »","\"We just moved in next door.\""],
  ["the neighbourhood / neighbours","« le quartier / les voisins »","Canadian spelling with U (like colour)!"],
  ["to break the ice","start a conversation with a stranger","Same image as in French — handy!"],
  ["Welcome to the neighbourhood!","THE Canadian welcome line","Answer: \"Thank you so much!\""],
  ["to chat / to have a chat","« jaser / bavarder »","\"We had a nice chat.\""],
  ["to lend a hand","« donner un coup de main »","\"Let me know if you need a hand!\""],
  ["snow removal / to shovel","« le déneigement / pelleter »","Winter conversation topic #1!"],
  ["a block party / a BBQ","« une fête de quartier »","\"We're having a BBQ on Saturday — join us!\""],
  ["to borrow / to lend","« emprunter / prêter »","Two different verbs: I borrow FROM you, you lend TO me."],
  ["Feel free to knock!","« n'hésitez pas à cogner ! »","The good-neighbour invitation."]],
 dialogue:[
  {loc:"You",txt:"Hi there! Sorry to bother you — we just moved in next door, number 42. I wanted to introduce myself: I'm Fatou."},
  {loc:"Neighbour",txt:"Oh, welcome to the neighbourhood! I'm Robert. How's the move going?"},
  {loc:"You",txt:"Thanks! Boxes everywhere, but we're getting there. Have you lived here long?"},
  {loc:"Neighbour",txt:"Twelve years now! It's a quiet street, you'll love it."},
  {loc:"You",txt:"That's good to hear. By the way, what day is garbage pickup here?"},
  {loc:"Neighbour",txt:"Thursday mornings — put the bins out Wednesday night. And in winter, we all help each other with the shovelling!"},
  {loc:"You",txt:"Good to know, thanks! Feel free to knock if you ever need anything."},
  {loc:"Neighbour",txt:"Same here! We do a street BBQ in August — I'll keep you posted."},
  {loc:"You",txt:"We'd love that. So nice to meet you, Robert!"}],
 interactif:[
  {avant:"Your neighbour is watering her flowers and smiles at you.",
   options:["Hi! I don't think we've met — I moved in last week at number 38.","(You rush back inside.)","Your flowers are in the wrong place."],bonne:0,
   exp:"\"I don't think we've met\" — the gentle ice-breaker + say where you live."},
  {avant:"\"Oh, welcome! I'm Diane. Where are you from, if you don't mind me asking?\"",
   options:["Thanks, Diane! I'm originally from Cameroon, by way of Belgium. How about you — are you from around here?","That's none of your business.","From far."],bonne:0,
   exp:"Answer simply + return the question (\"How about you?\"): that's small talk!"},
  {avant:"\"Born and raised right here! If you ever need anything, just knock on my door.\"",
   options:["That's so kind, Diane. Same here — and I am sure we will see each other around!","OK, I will need many things.","(You walk away without a word.)"],bonne:0,
   exp:"\"Same here\" + \"see each other around\": warm and natural."}],
 ouverture:"(Your neighbour is raking leaves; he sees you and smiles) — Hi there! Beautiful day, eh?",
 role:"You are a warm, slightly chatty Canadian neighbour. The learner (a francophone practicing English) just moved in and introduces themselves. Welcome them ('Welcome to the neighbourhood!'), chat about the street (garbage day, snow shovelling, the summer BBQ, the park nearby), ask simple friendly questions. Use natural Canadian expressions (eh, have a good one, no worries). Answer in 1-2 sentences. If the learner makes an important English mistake, naturally model the correct form. If they seem completely lost, you may add a very short French hint in parentheses.",
 exos:[
  {q:"\"We just moved in\" means:",options:["« nous venons d'emménager »","we're leaving soon","we moved the furniture","we are moved (emotionally)"],bonne:0,exp:"MOVE IN = arrive; move out = leave."},
  {q:"« Je peux t'emprunter ta pelle ? » →",options:["Can I borrow your shovel?","Can I lend your shovel?","Can you borrow me your shovel?","Can I loan from you shovel?"],bonne:0,exp:"BORROW = « emprunter » (I take); LEND = « prêter » (I give). The classic trap!"},
  {q:"\"I'll keep you posted\" means:",options:["« je te tiendrai au courant »","I'll send you mail","I'll put up a poster","I'll post your letter"],bonne:0,exp:"KEEP YOU POSTED — very common at work too."},
  {q:"\"Beautiful day, eh?\" — the Canadian \"eh\" is used to:",options:["invite the other person to react (« hein ? »)","express anger","say goodbye","correct a mistake"],bonne:0,exp:"The legendary Canadian EH. Answer: \"It sure is!\""}]},

{id:"pharmacy_en",icon:"💊",label:"At the Pharmacy",desc:"Prescriptions, refills and good questions",dispo:true,

{id:"renting_en",icon:"🏠",label:"Renting an Apartment",desc:"Viewings, key questions and the lease",dispo:true,

{id:"school_en",icon:"🎓",label:"Registering Your Child at School",desc:"Documents, the bus and before/after care",dispo:true,

  ["registration / to register","« l'inscription / inscrire »","\"I'd like to register my daughter for September.\""],
  ["the school board","the organization running schools","Public, Catholic, English or French."],
  ["proof of address","« preuve de résidence »","A bill or lease with your name."],
  ["the immunization record","« carnet de vaccination »","Required for registration."],

 dialogue:[

{id:"form_en",icon:"📄",label:"Filling Out an Official Form",desc:"Decode every box — no guessing!",dispo:true,
 vocab:[
  ["to fill out / sign / submit","the three verbs of every form","\"Fill out section A, sign, and submit.\""],
  ["in block letters","CAPITAL letters, easy to read","« en lettres moulées » — asked everywhere!"],
  ["last name / first name","watch the order!","Last name often comes FIRST on forms."],
  ["date of birth (YYYY-MM-DD)","the Canadian format","Year-month-day: 1990-03-04."],
  ["marital status","« état civil »","Single, married, common-law, divorced, widowed."],
  ["common-law partner","couple living together 12+ months","« conjoint de fait »"],
  ["a dependant","someone you support financially","« une personne à charge » — usually your kids."],
  ["check the box","« cochez la case »","\"Check the box that applies.\""],
  ["N/A (not applicable)","for questions that don't concern you","Never leave a box empty — write N/A."],
  ["a false statement","« une fausse déclaration »","Punishable — never guess, always ask!"]],
 dialogue:[
  {loc:"Agent",txt:"Here's the form. Please fill out section A in block letters."},
  {loc:"You",txt:"Okay. Quick question: under \"Name\", do I write my last name or my first name?"},
  {loc:"Agent",txt:"Last name first, then your first name in the next box."},
  {loc:"You",txt:"Perfect. And the date of birth — is it year-month-day?"},
  {loc:"Agent",txt:"Exactly: YYYY-MM-DD. For example, 1990-03-04."},
  {loc:"You",txt:"For marital status — we've lived together for three years but we're not married. What do I check?"},
  {loc:"Agent",txt:"\"Common-law\" — that's your status after twelve months of living together."},
  {loc:"You",txt:"Thanks! And section D about military service doesn't apply to me…"},
  {loc:"Agent",txt:"Write \"N/A\" — not applicable. Never leave a box empty."},
  {loc:"You",txt:"All done. Do I sign here at the bottom?"},
  {loc:"Agent",txt:"Yes, signature and date. I'll give you a receipt with your file number."},
  {loc:"You",txt:"Thank you so much for your patience!"}],

  {avant:"The agent: \"Section C is missing — your dependants.\"",

   exp:"Check your understanding BEFORE writing: dependants = the children you support."},

  {avant:"\"Are you done? Let's review it together before you sign.\"",

function getSitu(){for(var i=0;i<SITUATIONS.length;i++){if(SITUATIONS[i].id===S.situId)return SITUATIONS[i];}return null;}

function openSituation(id){
  stopAudio();
  setState({situId:id,situStep:0,situAns:{},situChat:[],situBusy:false});
}
function quitSituation(){stopAudio();setState({situId:null,situStep:0,situChat:[],situBusy:false});}
function goSituStep(n){
  stopAudio();
  var situ=getSitu();
  var maj={situStep:n};
  if(n===5&&situ&&!S.situationsDone[situ.id]){
    var d={};for(var k in S.situationsDone)d[k]=S.situationsDone[k];
    d[situ.id]=true;maj.situationsDone=d;
    sendToAgent('situation_terminee','🎭 '+situ.label);
  }
  setState(maj);
}

// ── Audio de situation (deux voix alternées) ──
function situAudio(){
  if(!window.speechSynthesis)return;
  var situ=getSitu();if(!situ)return;
  window.speechSynthesis.cancel();setState({playing:true});
  var lines=situ.dialogue.filter(function(l){return l.txt.indexOf("(")!==0;});
  var idx=0;var voice=getEnVoice();
  function next(){
    if(!S.playing)return;
    if(idx>=lines.length){setState({playing:false});return;}
    var u=new SpeechSynthesisUtterance(lines[idx].txt);
    u.lang="en-CA";u.rate=0.9;u.pitch=(lines[idx].loc==="Vous")?1.08:0.92;
    if(voice)u.voice=voice;
    u.onend=function(){idx++;setTimeout(next,400);};
    u.onerror=function(){idx++;next();};
    window.speechSynthesis.speak(u);
  }
  next();
}
function speakEn(t){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(t);u.lang="en-CA";u.rate=0.85;
  var v=getEnVoice();if(v)u.voice=v;
  window.speechSynthesis.speak(u);
}

// ── QCM générique des situations ──
function situQCM(prefix,i,item){
  var key=prefix+i;var rep=S.situAns[key];
  var html='<div style="background:#fff;border:2px solid #EEE;border-radius:12px;padding:12px;margin-bottom:10px">';
  if(item.avant)html+='<div style="font-size:12px;color:'+C.mid+';font-style:italic;margin-bottom:8px">'+esc(item.avant)+'</div>';
  if(item.q)html+='<div style="font-size:13px;font-weight:700;color:'+C.dark+';margin-bottom:8px">'+esc(item.q)+'</div>';
  html+=item.options.map(function(o,oi){
    var st='background:#fff;border:1.5px solid #DDD;color:'+C.dark;
    if(rep!==undefined){
      if(oi===item.bonne)st='background:'+C.greenL+';border:1.5px solid '+C.green+';color:'+C.green;
      else if(oi===rep)st='background:'+C.redL+';border:1.5px solid '+C.red+';color:'+C.red;
      else st='background:#fff;border:1.5px solid #EEE;color:'+C.mid;
    }
    return '<div onclick="'+(rep===undefined?'situRepondre(\''+key+'\','+oi+')':'')+'" style="'+st+';border-radius:10px;padding:9px 12px;margin-bottom:6px;font-size:12px;cursor:'+(rep===undefined?'pointer':'default')+'">'+esc(o)+'</div>';
  }).join("");
  if(rep!==undefined)html+='<div style="background:'+(rep===item.bonne?C.greenL:C.redL)+';border-radius:8px;padding:8px 10px;font-size:11px;color:'+(rep===item.bonne?C.green:C.red)+';margin-top:4px">'+(rep===item.bonne?"✅ ":"💡 ")+esc(item.exp)+'</div>';
  html+='</div>';
  return html;
}
function situRepondre(key,oi){var a={};for(var k in S.situAns)a[k]=S.situAns[k];a[key]=oi;setState({situAns:a});}

// ── Jeu de rôle IA ──
function situDemarrerJeu(){
  var situ=getSitu();if(!situ)return;
  setState({situChat:[{role:"assistant",content:situ.ouverture}]});
}
async function situEnvoyer(){
  var inp=document.getElementById("situInput");
  if(!inp)return;
  var txt=inp.value.trim();
  if(!txt||S.situBusy)return;
  inp.value="";
  var situ=getSitu();if(!situ)return;
  var chat=S.situChat.concat([{role:"user",content:txt}]);
  setState({situChat:chat,situBusy:true});
  try{
    var data=await nellyAPI({model:"claude-sonnet-4-6",max_tokens:350,
      system:situ.role+" IMPORTANT : reste toujours dans ton rôle, réponds en ANGLAIS uniquement, en 1 à 3 phrases simples et naturelles (si l'apprenant semble complètement perdu, ajoute une très courte aide en français entre parenthèses). C'est un jeu de rôle d'apprentissage de l'anglais (programme AngloVie by Nelly Folefack). Ne donne jamais de leçon de grammaire explicite pendant le jeu.",
      messages:chat});
    var rep=(data.content||[]).filter(function(c){return c.type==="text";}).map(function(c){return c.text;}).join("").trim();
    if(!rep)rep="(…)";
    setState({situChat:chat.concat([{role:"assistant",content:rep}]),situBusy:false});
  }catch(e){
    setState({situChat:chat.concat([{role:"assistant",content:"📵 Connection failed ("+(e.message||"erreur")+").  Please try again in a moment."}]),situBusy:false});
  }
}
async function situRetro(){
  var situ=getSitu();if(!situ||S.situBusy)return;
  var tours=S.situChat.filter(function(m){return m.role==="user";}).length;
  if(tours<2){
    setState({situChat:S.situChat.concat([{role:"assistant",content:"💬 (Nelly AI) Keep the conversation going a little longer — at least 2 or 3 lines — then ask for your feedback!"}])});
    return;
  }
  setState({situBusy:true});
  var transcription=S.situChat.map(function(m){return (m.role==="user"?"APPRENANT : ":"INTERLOCUTEUR : ")+m.content;}).join("\n");
  try{
    var data=await nellyAPI({model:"claude-sonnet-4-6",max_tokens:500,
      system:"Tu es Nelly IA, coach d'anglais du programme AngloVie (by Nelly Folefack). Tu évalues avec bienveillance la performance EN ANGLAIS de l'apprenant dans un jeu de rôle. Rédige ta rétroaction en français ; les corrections 🔧 citent l'anglais fautif puis la forme correcte. Bref et structuré.",
      messages:[{role:"user",content:"Situation : "+situ.label+". Voici la transcription du jeu de rôle :\n\n"+transcription+"\n\nDonne à l'apprenant : 1) un point fort précis (cite une de ses phrases), 2) une ou deux corrections au format 🔧 « faute » → « forme correcte », 3) un conseil concret pour la vraie vie. Maximum 6 lignes, ton chaleureux."}]});
    var rep=(data.content||[]).filter(function(c){return c.type==="text";}).map(function(c){return c.text;}).join("").trim();
    sendToAgent("retro_situation","🎭 "+situ.label);
    setState({situChat:S.situChat.concat([{role:"assistant",content:"🌟 NELLY AI — YOUR FEEDBACK\n\n"+rep}]),situBusy:false});
  }catch(e){
    setState({situChat:S.situChat.concat([{role:"assistant",content:"📵 Feedback unavailable right now ("+(e.message||"erreur")+")."}]),situBusy:false});
  }
}

 {q:"« Nous allons déménager en septembre » (already decided) →",options:["We're going to move in September.","We will to move in September.","We move September.","We moved in September."],bonne:0,exp:"Decided plan → GOING TO."}]},
{id:"c_continuous",cat:"conj",niveau:"B1",titre:"Present simple vs continuous",
 pts:["🇫🇷 French has ONE form (« je travaille »), English has TWO: I work (habit) / I'm working (right now).",
 "Present simple = habits, facts: I work downtown. The store opens at 9.",
 "Present continuous (BE + -ing) = now or temporary: I'm working from home this week. Sorry, she's helping another customer.",
 "State verbs never take -ing: know, want, need, like, understand → I KNOW (never \"I'm knowing\" ❌)."],
 exemple:"I usually take the bus, but this week I'm driving. I know the answer!",
 exos:[
 {q:"On the phone: « Elle aide un autre client en ce moment » →",options:["She's helping another customer right now.","She helps another customer right now.","She helping another customer.","She is help another customer."],bonne:0,exp:"Right now → present continuous: she IS helpING."},
 {q:"« Je comprends » →",options:["I understand.","I am understanding.","I understanding.","I am understand."],bonne:0,exp:"UNDERSTAND is a state verb → never -ing."}]},
{id:"o_majuscules_en",cat:"ortho",niveau:"A1",titre:"Capital letters: I, Monday, French",
 pts:["🇫🇷 The opposite of French! Days, months, languages and nationalities ALWAYS take a capital: Monday, July, French, Canadian.",
 "The pronoun I is ALWAYS capitalized, even mid-sentence: My husband and I live in Ontario.",
 "French: lundi, juillet, le français — English: Monday, July, French. Flip the reflex!"],
 exemple:"On Monday, I have my English class. I'm Cameroonian and I speak French.",
 exos:[
 {q:"Which sentence is correct?",options:["I speak French and English.","i speak french and english.","I speak french and english.","i speak French and English."],bonne:0,exp:"Capital I + capital languages."},
 {q:"« Le cours commence lundi » →",options:["The class starts on Monday.","The class starts on monday.","The class starts on Lundi.","the class starts on monday."],bonne:0,exp:"Day of the week → capital: Monday."}]},
{id:"o_homoph_en",cat:"ortho",niveau:"B1",titre:"their / there / they're · its / it's · your / you're",
 pts:["THEIR = possession: their house. THERE = place / there is: there is a problem. THEY'RE = they are: they're friendly.",
 "ITS = possession: the city and its parks. IT'S = it is: it's cold!",
 "YOUR = possession: your file. YOU'RE = you are: you're welcome. The test: replace with \"they are / it is / you are\" — if it works, use the apostrophe!"],
 exemple:"They're moving into their new house — it's over there! You're going to love your new neighbourhood.",
 exos:[
 {q:"« ___ welcome! » (after thank you)",options:["You're","Your","Youre","You'r"],bonne:0,exp:"You ARE welcome → YOU'RE."},
 {q:"« ___ is a pharmacy near ___ house. »",options:["There / their","Their / there","They're / their","There / they're"],bonne:0,exp:"THERE is (place) / THEIR house (possession)."}]},
{id:"e_greet_en",cat:"expr",niveau:"A1",titre:"Greetings and introductions",
 pts:["Hi! / Hello! / Good morning! — \"How are you?\" or \"How's it going?\" is a RITUAL greeting. Expected answer: short and positive: \"I'm good, thanks! And you?\"",
 "Introducing yourself: My name is… / I'm… — I'm from Cameroon — Nice to meet you! → answer: Nice to meet you too!",
 "🍁 Canadian culture: \"How are you?\" is NOT a real health question — it's a hello! Answer \"Good, thanks!\" and move on."],
 exemple:"Hi! I'm Fatou, nice to meet you! — Nice to meet you too! How's it going? — Great, thanks!",
 exos:[
 {q:"A colleague says \"How's it going?\". You answer:",options:["Good, thanks! And you?","(a full summary of your health problems)","Where am I going?","Yes."],bonne:0,exp:"It's a ritual hello → short positive answer + return the question."},
 {q:"Someone says \"Nice to meet you!\". You answer:",options:["Nice to meet you too!","Yes, I am nice.","Thank you very much sir.","Me too meet."],bonne:0,exp:"\"Nice to meet you TOO\" — return the formula."}]},
{id:"e_phone_en",cat:"expr",niveau:"A2",titre:"On the phone",
 pts:["Answering: Hello! — Naming yourself: This is Fatou (speaking). — Asking for someone: May I speak to Mr. Chen, please?",
 "Stating your reason: I'm calling about the apartment / my application.",
 "Your lifesavers: Could you repeat that, please? — Could you speak more slowly? — Sorry, I didn't catch that. — Can you spell that for me?"],
 exemple:"Hello, this is Koffi speaking. I'm calling about the job posting. Could you repeat that, please?",
 exos:[
 {q:"To state the reason for your call:",options:["I'm calling about my application.","I telephone for the thing.","Me calling application.","You know why I call."],bonne:0,exp:"\"I'm calling about…\" — THE opening formula on the phone."},
 {q:"You didn't understand. You say:",options:["Sorry, could you repeat that, please?","What?!","Repeat!","(you hang up)"],bonne:0,exp:"Polite, effective, universal."}]},
{id:"e_polite_en",cat:"expr",niveau:"B1",titre:"Polite requests: could / would",
 pts:["🇫🇷 \"I want\" is too direct in Canadian English! Say I'D LIKE: I'd like an appointment, please.",
 "Could you…? / Would you be able to…?: Could you send me the form?",
 "Would you mind + -ING (extra polite): Would you mind repeating that? Permission: May I…? Could I…?",
 "The winning combo: polite formula + PLEASE + THANK YOU SO MUCH. Canadian politeness loves abundance!"],
 exemple:"Hi! I'd like to book an appointment, please. Would you be able to fit me in on Friday? Thank you so much!",
 exos:[
 {q:"The most polite way to order a coffee:",options:["I'd like a coffee, please.","I want a coffee.","Give me a coffee.","Coffee. Now."],bonne:0,exp:"I'D LIKE + please: the reflex that replaces \"I want\"."},
 {q:"« Pourriez-vous m'envoyer le document ? » →",options:["Could you send me the document, please?","You send me the document.","Send the document to me.","You could sending the document?"],bonne:0,exp:"COULD YOU + verb + please: the standard polite request."}]}
];
// ── État & helpers ──
function getRevLecon(){for(var i=0;i<REV_LECONS.length;i++){if(REV_LECONS[i].id===S.revId)return REV_LECONS[i];}return null;}
function openRevLecon(id){setState({revId:id,revAns:{}});}
function quitRevLecon(){setState({revId:null});}
function revRepondre(key,oi){var a={};for(var k in (S.revAns||{}))a[k]=S.revAns[k];a[key]=oi;setState({revAns:a});}
function terminerRevLecon(){
  var l=getRevLecon();if(!l)return;
  if(!S.revDone[l.id]){
    var d={};for(var k in S.revDone)d[k]=S.revDone[k];
    d[l.id]=true;
    sendToAgent('revision_terminee','📖 '+l.titre+' ('+l.niveau+')');
    setState({revDone:d,revId:null});
  }else setState({revId:null});
}
function nivBadge(n){return '<span style="background:'+NIV_COLORS[n]+';color:#fff;border-radius:6px;padding:2px 7px;font-size:9px;font-weight:800;letter-spacing:.5px">'+n+'</span>';}

function revQCM(i,item){
  var key="q"+i;var rep=(S.revAns||{})[key];
  var html='<div style="background:#fff;border:2px solid #EEE;border-radius:12px;padding:12px;margin-bottom:10px">'+
  '<div style="font-size:13px;font-weight:700;color:'+C.dark+';margin-bottom:8px">'+(i+1)+'. '+esc(item.q)+'</div>'+
  item.options.map(function(o,oi){
    var st='background:#fff;border:1.5px solid #DDD;color:'+C.dark;
    if(rep!==undefined){
      if(oi===item.bonne)st='background:'+C.greenL+';border:1.5px solid '+C.green+';color:'+C.green;
      else if(oi===rep)st='background:'+C.redL+';border:1.5px solid '+C.red+';color:'+C.red;
      else st='background:#fff;border:1.5px solid #EEE;color:'+C.mid;
    }
    return '<div onclick="'+(rep===undefined?'revRepondre(\''+key+'\','+oi+')':'')+'" style="'+st+';border-radius:10px;padding:9px 12px;margin-bottom:6px;font-size:12px;cursor:'+(rep===undefined?'pointer':'default')+'">'+esc(o)+'</div>';
  }).join("")+
  (rep!==undefined?'<div style="background:'+(rep===item.bonne?C.greenL:C.redL)+';border-radius:8px;padding:8px 10px;font-size:11px;color:'+(rep===item.bonne?C.green:C.red)+';margin-top:4px">'+(rep===item.bonne?"✅ ":"💡 ")+esc(item.exp)+'</div>':"")+
  '</div>';
  return html;
}

// ── Rendus ──
function renderReviser(){
  if(S.revId)return renderRevLecon();
  var _retour=retour("Learn","goSub(null)");
  var filt=S.revNiveau||"tous";
  var nDone=Object.keys(S.revDone||{}).length;
  return '<div>'+_retour+
  '<div style="background:'+REV_COLOR+';padding:18px 16px;border-radius:16px">'+
  '<div style="font-size:11px;color:rgba(255,255,255,.5);font-weight:700;letter-spacing:1px;margin-bottom:4px">REVIEW · ANGLOVIE</div>'+
  '<h2 style="margin:0;color:#fff;font-size:20px;font-weight:900">📖 Review</h2>'+
  '<p style="margin:4px 0 0;color:rgba(255,255,255,.7);font-size:13px">Short lessons · English logic · francophone traps · instant practice — by level</p></div>'+
  '<div style="padding:12px">'+
  // Filtre par niveau
  '<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">'+
  ["tous","A1","A2","B1","B2"].map(function(n){
    var act=filt===n;
    var col=n==="tous"?REV_COLOR:NIV_COLORS[n];
    return '<button onclick="setState({revNiveau:\''+n+'\'})" style="background:'+(act?col:"#fff")+';color:'+(act?"#fff":col)+';border:2px solid '+col+';border-radius:20px;padding:6px 14px;font-size:12px;font-weight:800;cursor:pointer">'+(n==="tous"?"All":n)+'</button>';
  }).join("")+'</div>'+
  '<div style="font-size:11px;color:'+C.mid+';margin-bottom:12px">✅ '+nDone+' lesson'+(nDone>1?'s':'')+' completed · tap a theme to see its lessons</div>'+
  REV_CATS.map(function(cat){
    if(cat.id==="vocab"){
      var key="expandRev_vocab";var open=S[key];
      return '<div style="margin-bottom:8px">'+
      '<div onclick="var u={};u[\''+key+'\']=!S[\''+key+'\'];setState(u)" style="background:#fff;border:2px solid '+(open?REV_COLOR:"#EEE")+';border-radius:'+(open?"12px 12px 0 0":"12px")+';padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px">'+
      '<span style="font-size:18px">'+cat.icon+'</span>'+
      '<div style="flex:1;font-size:13px;font-weight:800;color:'+C.dark+'">'+cat.titre+'</div>'+
      '<span style="font-size:10px;color:'+C.mid+'">'+VOCAB_BIB.length+' themes</span>'+
      '<span style="color:'+C.mid+'">'+(open?"▲":"▼")+'</span></div>'+
      (open?'<div style="background:#FAFAFA;border:2px solid '+REV_COLOR+';border-top:none;border-radius:0 0 12px 12px">'+bibliothequeVocab()+'</div>':"")+'</div>';
    }
    var lecons=REV_LECONS.filter(function(l){return l.cat===cat.id&&(filt==="tous"||l.niveau===filt);});
    if(!lecons.length)return "";
    var key2="expandRev_"+cat.id;var open2=S[key2];
    var doneCat=lecons.filter(function(l){return S.revDone[l.id];}).length;
    return '<div style="margin-bottom:8px">'+
    '<div onclick="var u={};u[\''+key2+'\']=!S[\''+key2+'\'];setState(u)" style="background:#fff;border:2px solid '+(open2?REV_COLOR:"#EEE")+';border-radius:'+(open2?"12px 12px 0 0":"12px")+';padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px">'+
    '<span style="font-size:18px">'+cat.icon+'</span>'+
    '<div style="flex:1;font-size:13px;font-weight:800;color:'+C.dark+'">'+cat.titre+'</div>'+
    '<span style="font-size:10px;color:'+C.mid+'">'+doneCat+'/'+lecons.length+'</span>'+
    '<span style="color:'+C.mid+'">'+(open2?"▲":"▼")+'</span></div>'+
    (open2?'<div style="background:#FAFAFA;border:2px solid '+REV_COLOR+';border-top:none;border-radius:0 0 12px 12px;padding:10px">'+
    lecons.map(function(l){
      var done=S.revDone[l.id];
      return '<div onclick="openRevLecon(\''+l.id+'\')" style="background:#fff;border:1.5px solid '+(done?C.green:"#EEE")+';border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:8px">'+
      nivBadge(l.niveau)+
      '<div style="flex:1;font-size:12px;font-weight:700;color:'+C.dark+'">'+esc(l.titre)+'</div>'+
      (done?'<span style="color:'+C.green+';font-size:16px">✅</span>':'<span style="color:'+REV_COLOR+';font-size:14px">→</span>')+'</div>';
    }).join("")+'</div>':"")+'</div>';
  }).join("")+
  '</div></div>';
}

function renderRevLecon(){
  var l=getRevLecon();if(!l)return renderReviser();
  var cat=REV_CATS.filter(function(c){return c.id===l.cat;})[0];
  var nEx=(l.exos||[]).filter(function(x,i){return (S.revAns||{})["q"+i]!==undefined;}).length;
  return '<div>'+
  '<div style="background:'+NIV_COLORS[l.niveau]+';padding:12px 16px;border-radius:16px">'+
  '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
  '<button onclick="quitRevLecon()" style="background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer">← Review</button>'+
  '<span style="background:rgba(255,255,255,.25);color:#fff;border-radius:6px;padding:3px 9px;font-size:10px;font-weight:800">'+cat.icon+' '+esc(cat.titre)+' · '+l.niveau+'</span></div>'+
  '<h2 style="margin:0;color:#fff;font-size:16px;font-weight:900">'+esc(l.titre)+'</h2></div>'+
  '<div style="padding:14px 12px">'+
  '<div style="font-size:12px;font-weight:800;color:'+NIV_COLORS[l.niveau]+';margin-bottom:8px">💡 KEY POINTS</div>'+
  l.pts.map(function(p){
    return '<div style="background:#fff;border:1.5px solid #EEE;border-radius:12px;padding:11px 13px;margin-bottom:8px;font-size:12px;line-height:1.6;color:'+C.dark+'">'+esc(p)+'</div>';
  }).join("")+
  '<div style="background:'+C.goldL+';border:1.5px solid '+C.gold+';border-radius:12px;padding:11px 13px;margin:12px 0;font-size:12px;line-height:1.6;color:'+C.dark+'">'+
  '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><strong style="color:'+C.gold+';font-size:11px">✨ EXAMPLE</strong>'+
  '<button onclick="speakEn(\''+esc(l.exemple).replace(/'/g,"\\'")+'\')" style="background:#fff;border:1px solid '+C.gold+';border-radius:6px;padding:2px 8px;font-size:11px;cursor:pointer">🔊</button></div>'+
  esc(l.exemple)+'</div>'+
  '<div style="font-size:12px;font-weight:800;color:'+NIV_COLORS[l.niveau]+';margin:14px 0 8px">🧩 PRACTICE</div>'+
  (l.exos||[]).map(function(x,i){return revQCM(i,x);}).join("")+
  (nEx===(l.exos||[]).length?
  '<button onclick="terminerRevLecon()" style="width:100%;background:'+C.green+';color:#fff;border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:800;cursor:pointer;margin-top:6px">✓ Mark lesson as complete</button>':
  '<div style="text-align:center;font-size:11px;color:'+C.mid+';margin-top:6px">Answer the exercises to complete the lesson</div>')+
  '</div></div>';
}

</script>
<script>

// ═══════════════════════════════════════════════════════════════
// ANGLOVIE 2.0 — 🚨 FRANCOPHONE TRAPS
// Each classic mistake, its logic, its fix — English first,
// French only to explain WHY the mistake happens.
// ═══════════════════════════════════════════════════════════════
REV_CATS.splice(4,0,{id:"pieges",icon:"🚨",titre:"Francophone Traps"});

[
{id:"p_explainme",cat:"pieges",niveau:"A2",titre:"\"Explain me\" ❌ → Explain TO me",
 pts:["The trap: in French you say « explique-moi ». In English, EXPLAIN requires TO: Explain it TO me. Can you explain this rule TO me?",
 "The logic: some English verbs refuse a direct person. EXPLAIN, DESCRIBE, SUGGEST, RECOMMEND → always TO: She described the problem TO us.",
 "But TELL works like French: Tell me! ✔ — which is exactly why francophones mix them up: tell me ✔, explain me ❌."],
 exemple:"Could you explain the difference to me? — Sure! Let me tell you how it works.",
 exos:[
 {q:"« Explique-moi cette règle » →",options:["Explain this rule to me.","Explain me this rule.","Explain to this rule me.","Me explain this rule."],bonne:0,exp:"EXPLAIN + thing + TO + person."},
 {q:"Which verb accepts \"me\" directly?",options:["tell → tell me","explain → explain me","describe → describe me","suggest → suggest me"],bonne:0,exp:"TELL me ✔. The other three require TO me."}]},
{id:"p_search",cat:"pieges",niveau:"A2",titre:"\"I search a job\" ❌ → I'm looking FOR a job",
 pts:["The trap: « je cherche un emploi » ≠ I search a job. Say: I'm looking FOR a job.",
 "The logic: LOOK FOR = everyday searching. SEARCH is different: search the Internet (dig through), search FOR (deep, formal search).",
 "Casual Canadian bonus: job hunting! I've been job hunting for two months."],
 exemple:"I'm looking for a full-time job in customer service. I searched the company's website first.",
 exos:[
 {q:"« Je cherche un appartement » →",options:["I'm looking for an apartment.","I search an apartment.","I'm searching apartment.","I look an apartment."],bonne:0,exp:"LOOK FOR — don't forget the FOR!"},
 {q:"« Elle cherche ses clés » →",options:["She's looking for her keys.","She searches her keys.","She looks her keys.","She is search for keys."],bonne:0,exp:"Always LOOK FOR + the thing."}]},
{id:"p_liveleave",cat:"pieges",niveau:"A2",titre:"LIVE or LEAVE? Where do you live?",
 pts:["The sound trap: LIVE (to reside, short \"i\") and LEAVE (to go away, long \"ee\"). Where do you LIVE? = where is your home. Don't say Where do you LEAVE? (where do you depart from?!)",
 "LIVE: I live in Toronto. She lives with her sister. LEAVE: I leave home at 8. The bus leaves in 5 minutes.",
 "Memory trick: leave has two E's, like leaving takes time; live is short, like daily life."],
 exemple:"I live near the station, so I leave home ten minutes before my shift.",
 exos:[
 {q:"« Où habitez-vous ? » →",options:["Where do you live?","Where do you leave?","Where you live?","Where does you live?"],bonne:0,exp:"LIVE = reside. \"Where do you leave?\" asks where you depart from!"},
 {q:"« Le train part à 9 h » →",options:["The train leaves at 9.","The train lives at 9.","The train leave at 9.","The train is live at 9."],bonne:0,exp:"LEAVE = depart; third person → leaveS."}]},
{id:"p_mustHaveTo",cat:"pieges",niveau:"B1",titre:"MUST vs HAVE TO",
 pts:["Both mean « devoir », but: HAVE TO = external obligation (rule, law, boss): I have to work Saturdays. MUST = obligation I feel, or strong recommendation: You must try this restaurant!",
 "In the negative, the meaning flips completely! DON'T HAVE TO = not obliged (free): You don't have to come. MUSTN'T = forbidden! You mustn't park here.",
 "In everyday Canadian English, HAVE TO dominates. And must has no past → HAD TO: I had to wait two hours."],
 exemple:"I have to renew my permit this month. You must see the new office — it's beautiful! You don't have to bring anything.",
 exos:[
 {q:"« Tu n'es pas obligé de venir » →",options:["You don't have to come.","You mustn't come.","You must not to come.","You haven't to come."],bonne:0,exp:"DON'T HAVE TO = no obligation. MUSTN'T = forbidden — a dangerous mix-up!"},
 {q:"« J'ai dû attendre une heure » (past) →",options:["I had to wait an hour.","I must waited an hour.","I musted wait an hour.","I have to waited an hour."],bonne:0,exp:"MUST has no past → HAD TO."}]},
{id:"p_sinceFor",cat:"pieges",niveau:"B1",titre:"SINCE vs FOR",
 pts:["The trap: « depuis » has TWO translations. SINCE + starting point: since 2023, since Monday, since I arrived. FOR + duration: for two years, for three months.",
 "Quick test: if you could say « pendant » → FOR. If it's a precise date/moment → SINCE.",
 "With the present perfect: I've lived here SINCE 2023 = I've lived here FOR three years. Same reality, two angles."],
 exemple:"I've been in Canada since January — so I've been here for six months already!",
 exos:[
 {q:"« J'étudie l'anglais depuis trois mois » →",options:["I've been studying English for three months.","…since three months.","…for 2023.","…since three months ago."],bonne:0,exp:"Three months = a DURATION → FOR."},
 {q:"« Elle travaille ici depuis lundi » →",options:["She has worked here since Monday.","She has worked here for Monday.","She works here since Monday.","She worked here for Monday."],bonne:0,exp:"Monday = starting point → SINCE + present perfect."}]},
{id:"p_yetAlready",cat:"pieges",niveau:"B1",titre:"YET vs ALREADY",
 pts:["ALREADY = « déjà » in positive sentences (often with surprise): I've already finished! She's already here.",
 "YET = « pas encore / déjà ? » in questions and negatives, at the END of the sentence: I haven't received it yet. Have you eaten yet?",
 "The trap: « déjà ? » in a neutral question = YET, not already: Have you finished YET? (Already in a question = astonishment: Have you finished already?! — that fast?!)"],
 exemple:"Have you submitted your application yet? — Yes, I've already sent it! But I haven't heard back yet.",
 exos:[
 {q:"« Je n'ai pas encore reçu ma carte » →",options:["I haven't received my card yet.","I haven't already received my card.","I haven't received yet my card.","I not received my card already."],bonne:0,exp:"Negative → YET, always at the end."},
 {q:"« As-tu déjà mangé ? » (neutral) →",options:["Have you eaten yet?","Have you eaten already?","Did you eat yet already?","You have eaten yet?"],bonne:0,exp:"Neutral question → YET. (\"Already\" = that fast?!)"}]},
{id:"p_sayTell",cat:"pieges",niveau:"B1",titre:"SAY vs TELL",
 pts:["Both mean « dire », but: TELL + person: Tell ME, she told US, I'll tell the manager. SAY without a person (or with TO): He said (that)…, What did she say?, Say it TO him.",
 "The classic mistakes: He said me ❌ → He told me ✔. She told that… ❌ → She said that… ✔ (or She told ME that…).",
 "Fixed expressions: tell the truth, tell a story, tell the time — but say sorry, say hello, say a word."],
 exemple:"She told me the meeting was cancelled. — Really? What exactly did she say?",
 exos:[
 {q:"« Il m'a dit que c'était fermé » →",options:["He told me it was closed.","He said me it was closed.","He told that it was closed.","He said to that it was closed."],bonne:0,exp:"TELL + person: he told ME. (\"He said me\": THE calque to eliminate.)"},
 {q:"« Dis bonjour à ta mère ! » →",options:["Say hello to your mom!","Tell hello to your mom!","Say your mom hello to!","Tell hello your mom!"],bonne:0,exp:"SAY hello (fixed expression) + TO + person."}]},
{id:"p_makeDo",cat:"pieges",niveau:"B1",titre:"MAKE vs DO",
 pts:["The trap: « faire » has two verbs! DO = activities, work, vague tasks: do the dishes, do my homework, do business, do your best.",
 "MAKE = create, produce a result: make dinner, make money, make a decision, make a mistake, make an appointment, make friends.",
 "Canadian must-knows: make an appointment, make a living, do the groceries… but make a grocery list! When in doubt: concrete result → make."],
 exemple:"I made an appointment for Friday. I still have to do the paperwork — I hope I don't make a mistake!",

  var LCOL={A1:"#1A7A7A",A2:"#1B4F72",B1:"#1E8449",B2:"#D4AC0D"};
  return '<div style="padding:0 12px 12px">'+
  '<div style="background:'+C.navy+';border-radius:14px;padding:14px 16px;margin-bottom:10px">'+
  '<div style="font-size:14px;font-weight:900;color:#fff">💬 Smart Vocabulary</div>'+
  '<div style="font-size:11px;color:rgba(255,255,255,.7);margin-top:2px">'+VOCAB_BIB.length+' themes · A1 → B2 · tap 🔊 to listen · ☆ to save to your Bank</div></div>'+
  '<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">'+
  ["all","A1","A2","B1","B2"].map(function(n){
    return '<button onclick="S.vocabLvl=\''+n+'\';render()" style="border-radius:20px;padding:6px 13px;font-size:11px;font-weight:800;cursor:pointer;border:2px solid '+(lv===n?C.navy:"#DDD")+';background:'+(lv===n?C.navy:"#fff")+';color:'+(lv===n?"#fff":C.mid)+'">'+(n==="all"?"All":n)+'</button>';
  }).join("")+'</div>'+
  list.map(function(th){
    var key="expandBib_"+th.id;var open=S[key];
    return '<div style="margin-bottom:8px">'+
    '<div onclick="var u={};u[\''+key+'\']=!S[\''+key+'\'];setState(u)" style="background:#fff;border:2px solid '+(open?C.teal:"#EEE")+';border-radius:'+(open?"12px 12px 0 0":"12px")+';padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:10px">'+
    '<span style="font-size:18px">'+th.icon+'</span>'+
    '<div style="flex:1;font-size:13px;font-weight:800;color:'+C.dark+'">'+esc(th.titre)+'</div>'+
    '<span class="badge-niv" style="background:'+(LCOL[th.lvl]||C.mid)+'">'+th.lvl+'</span>'+
    '<span style="font-size:10px;color:'+C.mid+'">'+th.mots.length+'</span>'+
    '<span style="color:'+C.mid+'">'+(open?"▲":"▼")+'</span></div>'+
    (open?'<div style="background:#FAFAFA;border:2px solid '+C.teal+';border-top:none;border-radius:0 0 12px 12px;padding:10px">'+
    th.mots.map(function(m,wi){
      return '<div style="background:#fff;border:1px solid #EEE;border-radius:10px;padding:8px 10px;margin-bottom:6px">'+
      '<div style="display:flex;align-items:center;gap:8px">'+
      '<button onclick="speakEn(\''+esc(m[0]).replace(/'/g,"\\'")+'\')" style="background:'+C.tealL+';border:none;border-radius:8px;width:30px;height:30px;font-size:13px;cursor:pointer;flex-shrink:0">🔊</button>'+
      '<div style="flex:1"><span style="font-weight:800;color:'+C.navy+';font-size:13px">'+esc(m[0])+'</span>'+
      ' <span style="font-size:11px;color:'+C.mid+'">— '+esc(m[1])+'</span></div>'+
      '<span onclick="bankToggleW(\''+th.id+'\','+wi+')">'+starHtml("word",m[0])+'</span></div>'+
      (m[2]?'<div style="font-size:11px;color:'+C.dark+';margin-top:4px;padding-left:38px">'+esc(m[2])+'</div>':'')+'</div>';
    }).join("")+'</div>':'')+'</div>';
  }).join("")+'</div>';
}

/* ── 🍁 CANADIAN ENGLISH — categorized + stars ─────────────── */
var _CANCAT=["Greetings","Customer Service","Small Talk","Small Talk","Everyday","Workplace","Customer Service","Friends","Friends","Workplace","Everyday","Meetings","Workplace","Everyday","Friends","Customer Service","Small Talk","Interviews"];
CAN_EXPR.forEach(function(x,i){x.cat=_CANCAT[i]||"Everyday";});
function renderCanadian(){
  if(S.canId!==null&&S.canId!==undefined&&CAN_EXPR[S.canId])return renderCanDetail();
  var cats=["all"];CAN_EXPR.forEach(function(x){if(cats.indexOf(x.cat)<0)cats.push(x.cat);});
  var cc=S.canCat||"all";
  return retour("Learn","goSub(null)")+
  '<div class="sur">Canadian English</div>'+
  '<div class="titre-vue">🍁 Speak like a local</div>'+
  '<div class="note">'+CAN_EXPR.length+' expressions Canadians actually use — filter by situation, ☆ your favourites. (Growing library — 500+ on the roadmap!)</div>'+
  '<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">'+
  cats.map(function(n){
    return '<button onclick="S.canCat=\''+n+'\';render()" style="border-radius:20px;padding:6px 12px;font-size:11px;font-weight:800;cursor:pointer;border:2px solid '+(cc===n?"var(--or)":"#DDD")+';background:'+(cc===n?"var(--orBg)":"#fff")+';color:'+(cc===n?"#8a6d12":"var(--gris)")+'">'+(n==="all"?"All":n)+'</button>';
  }).join("")+'</div>'+
  CAN_EXPR.map(function(x,i){
    if(cc!=="all"&&x.cat!==cc)return "";
    return '<div class="carte gcarte" onclick="S.canId='+i+';render();window.scrollTo(0,0)">'+
    '<div class="gico" style="background:var(--goldL)">🍁</div>'+
    '<div class="gtxt"><div class="gtit">'+esc(x.e)+'</div><div class="gdesc">'+esc(x.m)+'</div></div>'+
    '<span onclick="event.stopPropagation();bankToggleC('+i+')">'+starHtml("expr",x.e)+'</span>'+
    '<div class="gfle">→</div></div>';
  }).join("");
}
